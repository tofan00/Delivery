<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول | Tofan Store</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>

  <style>
    :root{
      --primary:#14454d;
      --accent:#f37021;
      --soft:#f8fafc;
      --line:#e5e7eb;
      --danger:#ef4444;
      --success:#16a34a;
    }

    *{box-sizing:border-box}
    body{
      font-family:'Cairo',sans-serif;
      background:linear-gradient(180deg,#f8fafc 0%,#eef4f6 100%);
      min-height:100vh;
      color:#1f2937;
      -webkit-tap-highlight-color:transparent;
    }

    .top-loading{
      position:fixed;
      top:0;
      right:0;
      height:3px;
      width:0;
      background:linear-gradient(90deg,var(--primary),var(--accent));
      z-index:9999;
      transition:width .3s ease;
    }

    .glass-card{
      background:rgba(255,255,255,.9);
      backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,.6);
      box-shadow:0 20px 50px rgba(20,69,77,.08);
    }

    .store-badge{
      box-shadow:0 14px 35px rgba(20,69,77,.14);
    }

    .tab-btn{
      transition:.25s ease;
      border-radius:999px;
      font-weight:800;
      padding:14px 10px;
    }

    .tab-btn.active{
      background:var(--primary);
      color:#fff;
      box-shadow:0 10px 24px rgba(20,69,77,.18);
    }

    .tab-btn.inactive{
      background:#f3f4f6;
      color:#4b5563;
    }

    .field-wrap{
      position:relative;
    }

    .field-input{
      width:100%;
      border:none;
      outline:none;
      background:#f8fafc;
      border:1px solid #e5e7eb;
      border-radius:20px;
      padding:15px 16px;
      font-size:14px;
      font-weight:700;
      transition:.2s ease;
    }

    .field-input:focus{
      border-color:var(--primary);
      box-shadow:0 0 0 4px rgba(20,69,77,.08);
      background:#fff;
    }

    .field-label{
      display:block;
      font-size:12px;
      font-weight:800;
      color:#6b7280;
      margin-bottom:8px;
      margin-right:6px;
    }

    .primary-btn{
      width:100%;
      border:none;
      border-radius:999px;
      background:var(--primary);
      color:#fff;
      padding:15px 18px;
      font-weight:900;
      font-size:15px;
      transition:.2s ease;
      box-shadow:0 14px 30px rgba(20,69,77,.18);
    }

    .primary-btn:active{transform:scale(.98)}
    .primary-btn:disabled{opacity:.7;cursor:not-allowed}

    .secondary-btn{
      width:100%;
      border:none;
      border-radius:999px;
      background:#eff6ff;
      color:#1d4ed8;
      padding:14px 18px;
      font-weight:900;
      transition:.2s ease;
    }

    .secondary-btn:active{transform:scale(.98)}

    .ghost-btn{
      width:100%;
      border:none;
      border-radius:999px;
      background:#f3f4f6;
      color:#374151;
      padding:14px 18px;
      font-weight:900;
      transition:.2s ease;
    }

    .ghost-btn:active{transform:scale(.98)}

    .toast{
      position:fixed;
      bottom:26px;
      left:50%;
      transform:translateX(-50%);
      background:#111827;
      color:#fff;
      border-radius:999px;
      padding:12px 18px;
      z-index:9999;
      font-size:13px;
      font-weight:800;
      box-shadow:0 12px 32px rgba(0,0,0,.16);
      animation:toastUp .22s ease;
      white-space:nowrap;
      max-width:90%;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    @keyframes toastUp{
      from{opacity:0;transform:translate(-50%,18px)}
      to{opacity:1;transform:translate(-50%,0)}
    }

    .loader-overlay{
      position:fixed;
      inset:0;
      background:rgba(255,255,255,.8);
      backdrop-filter:blur(6px);
      z-index:9998;
      display:none;
      align-items:center;
      justify-content:center;
    }

    .loader-box{
      background:#fff;
      border:1px solid #eef2f7;
      border-radius:28px;
      padding:24px 28px;
      box-shadow:0 20px 50px rgba(0,0,0,.08);
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:12px;
    }

    .spinner{
      width:44px;
      height:44px;
      border:4px solid #e5e7eb;
      border-top-color:var(--primary);
      border-radius:50%;
      animation:spin .8s linear infinite;
    }

    @keyframes spin{
      to{transform:rotate(360deg)}
    }

    .fade-in{
      animation:fadeIn .35s ease;
    }

    @keyframes fadeIn{
      from{opacity:0;transform:translateY(12px)}
      to{opacity:1;transform:translateY(0)}
    }
  </style>
</head>
<body>

  <div id="topLoading" class="top-loading"></div>

  <div id="loaderOverlay" class="loader-overlay">
    <div class="loader-box">
      <div class="spinner"></div>
      <div class="font-black text-[var(--primary)] text-sm">جاري المعالجة...</div>
    </div>
  </div>

  <main class="min-h-screen flex items-center justify-center px-4 py-8">
    <div class="w-full max-w-md">
      <div class="text-center mb-6">
        <button onclick="goHome()" class="mb-5 inline-flex items-center gap-2 bg-white px-4 py-2 rounded-full shadow-sm border border-gray-100 text-gray-600 font-bold">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
          العودة للرئيسية
        </button>

        <div class="mx-auto w-24 h-24 rounded-full bg-white store-badge flex items-center justify-center p-3 mb-4">
          <img id="storeLogo" src="https://up6.cc/2026/03/17733402856661.png" class="w-full h-full object-contain" alt="store logo">
        </div>

        <h1 id="storeName" class="text-2xl font-black text-[var(--primary)]">Tofan Store</h1>
        <p class="text-gray-400 font-bold text-sm mt-1">تسجيل الدخول أو إنشاء حساب جديد</p>
      </div>

      <div class="glass-card rounded-[32px] p-5 md:p-6">
        <div class="grid grid-cols-2 gap-2 bg-white rounded-full p-1 border border-gray-100 mb-6">
          <button id="tabLoginBtn" class="tab-btn active" onclick="switchTab('login')">تسجيل الدخول</button>
          <button id="tabRegisterBtn" class="tab-btn inactive" onclick="switchTab('register')">إنشاء حساب</button>
        </div>

        <section id="loginSection" class="fade-in">
          <div class="mb-4">
            <label class="field-label">البريد الإلكتروني</label>
            <div class="field-wrap">
              <input id="loginEmail" type="email" class="field-input" placeholder="example@email.com">
            </div>
          </div>

          <div class="mb-4">
            <label class="field-label">كلمة المرور</label>
            <div class="field-wrap">
              <input id="loginPassword" type="password" class="field-input" placeholder="********">
            </div>
          </div>

          <button id="loginBtn" onclick="handleLogin()" class="primary-btn mb-3">
            تسجيل الدخول
          </button>

          <button onclick="handleForgotPassword()" class="secondary-btn mb-3">
            نسيت كلمة المرور
          </button>

          <button onclick="goHome()" class="ghost-btn">
            متابعة التسوق
          </button>
        </section>

        <section id="registerSection" class="hidden fade-in">
          <div class="mb-4">
            <label class="field-label">الاسم الكامل</label>
            <div class="field-wrap">
              <input id="registerName" type="text" class="field-input" placeholder="اسمك الكامل">
            </div>
          </div>

          <div class="mb-4">
            <label class="field-label">البريد الإلكتروني</label>
            <div class="field-wrap">
              <input id="registerEmail" type="email" class="field-input" placeholder="example@email.com">
            </div>
          </div>

          <div class="mb-5">
            <label class="field-label">كلمة المرور</label>
            <div class="field-wrap">
              <input id="registerPassword" type="password" class="field-input" placeholder="6 أحرف أو أكثر">
            </div>
          </div>

          <button id="registerBtn" onclick="handleRegister()" class="primary-btn mb-3">
            إنشاء الحساب
          </button>

          <button onclick="goHome()" class="ghost-btn">
            متابعة التسوق
          </button>
        </section>
      </div>
    </div>
  </main>

  <script>
    firebase.initializeApp(firebaseConfig1885);
    const rtdb1885 = firebase.database();
    const auth1885 = firebase.auth();

    const fallbackLogo = "https://up6.cc/2026/03/17733402856661.png";

    let storeSettings = {
      storeName: "Tofan Store",
      storeLogoUrl: fallbackLogo
    };

    function setLoadingBar(on){
      const el = document.getElementById("topLoading");
      if(on){
        el.style.width = "68%";
      }else{
        el.style.width = "100%";
        setTimeout(() => el.style.width = "0%", 260);
      }
    }

    function setOverlayLoading(on){
      const el = document.getElementById("loaderOverlay");
      el.style.display = on ? "flex" : "none";
    }

    function showToast(msg){
      const old = document.querySelector(".toast");
      if(old) old.remove();

      const t = document.createElement("div");
      t.className = "toast";
      t.textContent = msg;
      document.body.appendChild(t);

      setTimeout(() => {
        t.style.opacity = "0";
        t.style.transform = "translate(-50%,16px)";
        setTimeout(() => t.remove(), 220);
      }, 2500);
    }

    function goHome(){
      window.location.href = "index.html";
    }

    function switchTab(tab){
      const loginSection = document.getElementById("loginSection");
      const registerSection = document.getElementById("registerSection");
      const tabLoginBtn = document.getElementById("tabLoginBtn");
      const tabRegisterBtn = document.getElementById("tabRegisterBtn");

      if(tab === "register"){
        loginSection.classList.add("hidden");
        registerSection.classList.remove("hidden");
        tabLoginBtn.className = "tab-btn inactive";
        tabRegisterBtn.className = "tab-btn active";
      }else{
        registerSection.classList.add("hidden");
        loginSection.classList.remove("hidden");
        tabRegisterBtn.className = "tab-btn inactive";
        tabLoginBtn.className = "tab-btn active";
      }
    }

    function normalizeUsername(value){
      return String(value || "")
        .trim()
        .toLowerCase()
        .replace(/\s+/g, "_")
        .replace(/[^a-z0-9_\u0600-\u06FF]/g, "");
    }

    function randomUsernameFromName(name){
      const base = normalizeUsername(name || "user") || "user";
      return `${base}_${Math.random().toString(36).slice(2,7)}`;
    }

    function escapeHtml(str){
      return String(str ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    async function loadStoreSettings(){
      try{
        const snap = await rtdb1885.ref(FIREBASE_PATHS_1885.settingsStore).get();
        const data = snap.val() || {};

        storeSettings = {
          storeName: data.storeName || "Tofan Store",
          storeLogoUrl: data.storeLogoUrl || fallbackLogo
        };

        document.getElementById("storeName").textContent = storeSettings.storeName;
        document.getElementById("storeLogo").src = storeSettings.storeLogoUrl;
      }catch(e){
        document.getElementById("storeLogo").src = fallbackLogo;
      }
    }

    async function ensureUserProfile(user){
      if(!user) return null;

      const ref = rtdb1885.ref(`${FIREBASE_PATHS_1885.users}/${user.uid}`);
      const snap = await ref.get();
      const oldData = snap.val() || null;

      if(oldData){
        await ref.update({
          uid: user.uid,
          email: user.email || oldData.email || "",
          displayName: user.displayName || oldData.displayName || "",
          updatedAt: Date.now()
        });
        return { ...oldData, uid: user.uid };
      }

      const newProfile = {
        uid: user.uid,
        email: user.email || "",
        displayName: user.displayName || "",
        username: randomUsernameFromName(user.displayName || "user"),
        role: "user",
        verified: false,
        createdAt: Date.now(),
        updatedAt: Date.now()
      };

      await ref.set(newProfile);
      return newProfile;
    }

    async function handleLogin(){
      const email = (document.getElementById("loginEmail").value || "").trim().toLowerCase();
      const password = (document.getElementById("loginPassword").value || "").trim();

      if(!email || !email.includes("@")){
        showToast("أدخل البريد بشكل صحيح");
        return;
      }

      if(password.length < 6){
        showToast("أدخل كلمة المرور بشكل صحيح");
        return;
      }

      setOverlayLoading(true);

      try{
        await auth1885.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
        const cred = await auth1885.signInWithEmailAndPassword(email, password);
        await ensureUserProfile(cred.user);

        showToast("تم تسجيل الدخول بنجاح");

        setTimeout(() => {
          const redirect = sessionStorage.getItem("login_redirect_1885");
          if(redirect){
            sessionStorage.removeItem("login_redirect_1885");
            window.location.href = redirect;
          }else{
            window.location.href = "index.html";
          }
        }, 600);
      }catch(e){
        console.error(e);

        if(
          e.code === "auth/user-not-found" ||
          e.code === "auth/wrong-password" ||
          e.code === "auth/invalid-credential" ||
          e.code === "auth/invalid-login-credentials"
        ){
          showToast("البريد أو كلمة المرور غير صحيحة");
        }else if(e.code === "auth/too-many-requests"){
          showToast("تم تقييد المحاولات مؤقتاً، حاول لاحقاً");
        }else{
          showToast("تعذر تسجيل الدخول");
        }
      }finally{
        setOverlayLoading(false);
      }
    }

    async function handleRegister(){
      const displayName = (document.getElementById("registerName").value || "").trim();
      const email = (document.getElementById("registerEmail").value || "").trim().toLowerCase();
      const password = (document.getElementById("registerPassword").value || "").trim();

      if(displayName.length < 2){
        showToast("أدخل الاسم الكامل");
        return;
      }

      if(!email || !email.includes("@")){
        showToast("أدخل بريدًا صحيحًا");
        return;
      }

      if(password.length < 6){
        showToast("كلمة المرور يجب أن تكون 6 أحرف أو أكثر");
        return;
      }

      setOverlayLoading(true);

      try{
        await auth1885.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
        const cred = await auth1885.createUserWithEmailAndPassword(email, password);

        try{
          await cred.user.updateProfile({ displayName });
        }catch(err){}

        await rtdb1885.ref(`${FIREBASE_PATHS_1885.users}/${cred.user.uid}`).set({
          uid: cred.user.uid,
          email,
          displayName,
          username: randomUsernameFromName(displayName),
          role: "user",
          verified: false,
          createdAt: Date.now(),
          updatedAt: Date.now()
        });

        showToast("تم إنشاء الحساب بنجاح");

        setTimeout(() => {
          const redirect = sessionStorage.getItem("login_redirect_1885");
          if(redirect){
            sessionStorage.removeItem("login_redirect_1885");
            window.location.href = redirect;
          }else{
            window.location.href = "index.html";
          }
        }, 700);
      }catch(e){
        console.error(e);

        if(e.code === "auth/email-already-in-use"){
          showToast("هذا البريد مستخدم بالفعل");
        }else if(e.code === "auth/invalid-email"){
          showToast("البريد غير صالح");
        }else if(e.code === "auth/weak-password"){
          showToast("كلمة المرور ضعيفة");
        }else if(e.code === "auth/operation-not-allowed"){
          showToast("فعّل Email/Password من Firebase Authentication");
        }else{
          showToast("تعذر إنشاء الحساب");
        }
      }finally{
        setOverlayLoading(false);
      }
    }

    async function handleForgotPassword(){
      const email = (document.getElementById("loginEmail").value || "").trim().toLowerCase();

      if(!email || !email.includes("@")){
        showToast("أدخل البريد أولاً");
        return;
      }

      setOverlayLoading(true);

      try{
        await auth1885.sendPasswordResetEmail(email);
        showToast("تم إرسال رابط إعادة تعيين كلمة المرور");
      }catch(e){
        console.error(e);

        if(e.code === "auth/user-not-found"){
          showToast("لا يوجد حساب بهذا البريد");
        }else if(e.code === "auth/invalid-email"){
          showToast("البريد غير صالح");
        }else{
          showToast("تعذر إرسال رابط الاستعادة");
        }
      }finally{
        setOverlayLoading(false);
      }
    }

    async function bootPage(){
      setLoadingBar(true);
      try{
        await loadStoreSettings();
        auth1885.onAuthStateChanged((user) => {
          if(user){
            const redirect = sessionStorage.getItem("login_redirect_1885");
            if(redirect){
              sessionStorage.removeItem("login_redirect_1885");
              window.location.href = redirect;
            }
          }
        });
      }catch(e){
        console.error(e);
      }finally{
        setLoadingBar(false);
      }
    }

    window.addEventListener("load", bootPage);
  </script>
</body>
</html>
