<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tofan Store | الطلبات</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>

  <style>
    :root{
      --primary:#14454d;
      --accent:#f37021;
      --bg:#f6f8fb;
      --line:#e7edf3;
      --text:#0f172a;
      --muted:#64748b;
      --success:#16a34a;
      --warning:#d97706;
      --danger:#dc2626;
      --info:#2563eb;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      font-family:'Cairo',sans-serif;
      background:var(--bg);
      color:var(--text);
      -webkit-tap-highlight-color:transparent;
    }

    .top-loading{
      position:fixed;
      top:0;
      right:0;
      width:0;
      height:3px;
      z-index:9999;
      background:linear-gradient(90deg,var(--primary),var(--accent));
      transition:width .3s ease;
    }

    .overlay-loading{
      position:fixed;
      inset:0;
      background:rgba(255,255,255,.84);
      backdrop-filter:blur(6px);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:9998;
    }

    .loader-box{
      background:#fff;
      border:1px solid var(--line);
      border-radius:26px;
      padding:24px 28px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:12px;
      box-shadow:0 20px 60px rgba(0,0,0,.1);
    }

    .spinner{
      width:44px;
      height:44px;
      border-radius:999px;
      border:4px solid #e5e7eb;
      border-top-color:var(--primary);
      animation:spin .8s linear infinite;
    }

    @keyframes spin{to{transform:rotate(360deg)}}

    .page-wrap{
      max-width:980px;
      margin:auto;
      padding:14px 14px 40px;
    }

    .card{
      background:#fff;
      border:1px solid var(--line);
      border-radius:28px;
      box-shadow:0 10px 30px rgba(0,0,0,.04);
    }

    .header-bar{
      position:sticky;
      top:0;
      z-index:30;
      background:rgba(246,248,251,.96);
      backdrop-filter:blur(10px);
      padding:10px 0 12px;
      margin-bottom:10px;
    }

    .icon-circle{
      width:44px;
      height:44px;
      border-radius:999px;
      background:#fff;
      border:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      box-shadow:0 8px 20px rgba(0,0,0,.04);
    }

    .section-title{
      font-size:24px;
      font-weight:900;
      color:var(--primary);
    }

    .subtle{
      color:#94a3b8;
      font-weight:800;
      font-size:12px;
    }

    .field-label{
      display:block;
      margin-bottom:8px;
      margin-right:4px;
      font-size:12px;
      font-weight:900;
      color:#64748b;
    }

    .field{
      width:100%;
      border:1px solid #e5e7eb;
      background:#f8fafc;
      color:#111827;
      border-radius:18px;
      padding:13px 14px;
      outline:none;
      font-weight:800;
      transition:.2s ease;
    }

    .field:focus{
      border-color:var(--primary);
      background:#fff;
      box-shadow:0 0 0 4px rgba(20,69,77,.08);
    }

    .primary-btn,.secondary-btn,.ghost-btn{
      border:none;
      border-radius:18px;
      padding:14px 16px;
      font-weight:900;
      cursor:pointer;
      transition:.2s ease;
    }
    .primary-btn{
      background:var(--primary);
      color:#fff;
      box-shadow:0 14px 28px rgba(20,69,77,.18);
    }
    .secondary-btn{
      background:#f3f4f6;
      color:#334155;
    }
    .ghost-btn{
      background:#fff;
      color:var(--primary);
      border:1px solid #dfe7ee;
    }
    .primary-btn:active,.secondary-btn:active,.ghost-btn:active{transform:scale(.98)}

    .search-wrap{
      display:grid;
      grid-template-columns:1fr auto;
      gap:12px;
    }
    @media (max-width:640px){
      .search-wrap{grid-template-columns:1fr}
    }

    .status-chip{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:110px;
      padding:8px 14px;
      border-radius:999px;
      font-size:12px;
      font-weight:900;
      white-space:nowrap;
    }
    .status-pending{background:#fef3c7;color:#92400e}
    .status-approved{background:#dbeafe;color:#1d4ed8}
    .status-delivered{background:#dcfce7;color:#166534}
    .status-rejected{background:#fee2e2;color:#b91c1c}

    .order-card{
      background:#fff;
      border:1px solid var(--line);
      border-radius:26px;
      overflow:hidden;
      box-shadow:0 10px 24px rgba(0,0,0,.04);
    }

    .order-head{
      padding:18px 18px 14px;
      border-bottom:1px solid #eef2f6;
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }

    .order-body{
      padding:18px;
    }

    .meta-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px;
    }
    @media (max-width:700px){
      .meta-grid{grid-template-columns:1fr}
    }

    .meta-box{
      background:#f8fafc;
      border:1px solid #eef2f6;
      border-radius:20px;
      padding:12px 14px;
    }
    .meta-box .k{
      font-size:11px;
      color:#94a3b8;
      font-weight:900;
      margin-bottom:5px;
    }
    .meta-box .v{
      font-size:14px;
      color:#111827;
      font-weight:900;
      word-break:break-word;
      line-height:1.8;
    }

    .items-list{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .item-card{
      display:flex;
      align-items:center;
      gap:12px;
      padding:12px;
      border:1px solid #eef2f6;
      background:#fff;
      border-radius:20px;
    }

    .item-card img{
      width:72px;
      height:78px;
      object-fit:cover;
      border-radius:18px;
      border:1px solid #e5e7eb;
      background:#fff;
      flex:0 0 72px;
    }

    .line-clamp-2{
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }

    .summary-total{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:14px 0 0;
      margin-top:14px;
      border-top:1px solid #eef2f6;
    }
    .summary-total .k{
      font-size:18px;
      font-weight:900;
      color:#111827;
    }
    .summary-total .v{
      font-size:26px;
      font-weight:900;
      color:var(--primary);
    }

    .empty-box{
      background:#fff;
      border:1px dashed #dbe3eb;
      border-radius:24px;
      padding:28px 20px;
      text-align:center;
      color:#94a3b8;
      font-weight:800;
    }

    .toast{
      position:fixed;
      bottom:28px;
      left:50%;
      transform:translateX(-50%);
      background:#111827;
      color:#fff;
      border-radius:999px;
      padding:12px 18px;
      z-index:9999;
      font-size:13px;
      font-weight:900;
      box-shadow:0 12px 32px rgba(0,0,0,.16);
      max-width:92%;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .hidden-view{display:none !important}
  </style>
</head>
<body>

  <div id="topLoading" class="top-loading"></div>

  <div id="overlayLoading" class="overlay-loading">
    <div class="loader-box">
      <div class="spinner"></div>
      <div class="font-black text-[var(--primary)] text-sm">جاري التحميل...</div>
    </div>
  </div>

  <div class="page-wrap">
    <div class="header-bar">
      <div class="flex items-center justify-between gap-3">
        <button class="icon-circle" onclick="goHome()">
          <svg class="w-6 h-6 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"></path></svg>
        </button>

        <div class="text-center">
          <div class="section-title">الطلبات</div>
          <div class="subtle">Orders Tracking</div>
        </div>

        <div class="icon-circle">
          <svg class="w-5 h-5 text-[var(--primary)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M9 17v-6h13M9 5h13M9 11h13M4 6h.01M4 12h.01M4 18h.01"></path></svg>
        </div>
      </div>
    </div>

    <section class="card p-5 mb-4">
      <div class="flex items-start justify-between gap-4 flex-wrap mb-4">
        <div>
          <div class="section-title !text-[22px] mb-1">متابعة الطلبات</div>
          <div class="subtle">يمكنك البحث بكود التتبع أو مشاهدة طلباتك إذا كنت مسجل دخول</div>
        </div>

        <div id="accountStateBox" class="px-4 py-3 rounded-2xl bg-[#f8fafc] border border-[#e8edf2] text-sm font-black text-gray-700">
          جار التحقق...
        </div>
      </div>

      <div class="search-wrap">
        <div>
          <label class="field-label">كود التتبع</label>
          <input id="trackingInput" class="field" placeholder="اكتب كود التتبع هنا">
        </div>
        <div class="flex items-end gap-2">
          <button class="primary-btn w-full sm:w-auto" onclick="searchByTrackingCode()">بحث</button>
        </div>
      </div>

      <div class="mt-4 flex gap-3 flex-wrap">
        <button id="myOrdersBtn" class="secondary-btn hidden-view" onclick="loadMyOrders()">طلباتي</button>
        <button id="loginBtn" class="ghost-btn hidden-view" onclick="goLoginPage()">تسجيل الدخول</button>
        <button id="logoutBtn" class="secondary-btn hidden-view" onclick="logoutUser()">تسجيل الخروج</button>
      </div>
    </section>

    <section id="searchResultSection" class="hidden-view mb-4">
      <div class="card p-5">
        <div class="section-title !text-[20px] mb-4">نتيجة البحث</div>
        <div id="searchResultBox"></div>
      </div>
    </section>

    <section id="myOrdersSection" class="hidden-view">
      <div class="card p-5 mb-4">
        <div class="section-title !text-[20px] mb-1">طلباتي</div>
        <div class="subtle">هذه الطلبات مرتبطة بحسابك الحالي</div>
      </div>

      <div id="myOrdersList" class="space-y-4"></div>
    </section>
  </div>

  <script>
    firebase.initializeApp(firebaseConfig1885);
    const rtdb = firebase.database();
    const auth = firebase.auth();

    const PATHS = {
      orders: FIREBASE_PATHS_1885.orders,
      users: "users1885"
    };

    let currentUser = null;
    let currentUserProfile = null;

    function setLoadingBar(on){
      const el = document.getElementById("topLoading");
      if(on){
        el.style.width = "65%";
      }else{
        el.style.width = "100%";
        setTimeout(() => el.style.width = "0%", 260);
      }
    }

    function setOverlayLoading(on){
      document.getElementById("overlayLoading").style.display = on ? "flex" : "none";
    }

    function showToast(msg){
      const old = document.querySelector(".toast");
      if(old) old.remove();
      const el = document.createElement("div");
      el.className = "toast";
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(() => {
        el.style.opacity = "0";
        el.style.transform = "translateX(-50%) translateY(16px)";
        setTimeout(() => el.remove(), 220);
      }, 2200);
    }

    function escapeHtml(str){
      return String(str ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function money(v){
      return `${Number(v || 0).toFixed(2)} ₪`;
    }

    function formatDate(ts){
      if(!ts) return "-";
      try{
        return new Date(ts).toLocaleString("ar-EG", {
          year:"numeric",
          month:"short",
          day:"numeric",
          hour:"2-digit",
          minute:"2-digit"
        });
      }catch{
        return "-";
      }
    }

    function statusInfo(status){
      const s = String(status || "pending").toLowerCase();
      if(s === "approved") return { text:"تمت الموافقة", cls:"status-approved" };
      if(s === "delivered") return { text:"تم التسليم", cls:"status-delivered" };
      if(s === "rejected") return { text:"مرفوض", cls:"status-rejected" };
      return { text:"قيد الانتظار", cls:"status-pending" };
    }

    function goHome(){
      window.location.href = "index.html";
    }

    function goLoginPage(){
      sessionStorage.setItem("login_redirect_1885", "order.html");
      window.location.href = "login.html";
    }

    async function logoutUser(){
      try{
        await auth.signOut();
        currentUser = null;
        currentUserProfile = null;
        applyUserStateUI();
        document.getElementById("myOrdersSection").classList.add("hidden-view");
        document.getElementById("myOrdersList").innerHTML = "";
        showToast("تم تسجيل الخروج");
      }catch(e){
        showToast("تعذر تسجيل الخروج");
      }
    }

    async function loadUserProfile(){
      if(!currentUser) return null;
      try{
        const snap = await rtdb.ref(`${PATHS.users}/${currentUser.uid}`).get();
        currentUserProfile = snap.val() || {
          uid: currentUser.uid,
          email: currentUser.email || "",
          displayName: currentUser.displayName || ""
        };
        return currentUserProfile;
      }catch{
        currentUserProfile = {
          uid: currentUser.uid,
          email: currentUser.email || "",
          displayName: currentUser.displayName || ""
        };
        return currentUserProfile;
      }
    }

    function applyUserStateUI(){
      const box = document.getElementById("accountStateBox");
      const loginBtn = document.getElementById("loginBtn");
      const logoutBtn = document.getElementById("logoutBtn");
      const myOrdersBtn = document.getElementById("myOrdersBtn");

      if(currentUser){
        const name = currentUserProfile?.displayName || currentUser.displayName || currentUser.email || "مستخدم";
        box.textContent = `مسجل دخول: ${name}`;
        loginBtn.classList.add("hidden-view");
        logoutBtn.classList.remove("hidden-view");
        myOrdersBtn.classList.remove("hidden-view");
      }else{
        box.textContent = "غير مسجل دخول - يمكنك البحث بكود التتبع";
        loginBtn.classList.remove("hidden-view");
        logoutBtn.classList.add("hidden-view");
        myOrdersBtn.classList.add("hidden-view");
      }
    }

    function renderOrderCard(order){
      const status = statusInfo(order.status);
      const items = Array.isArray(order.items) ? order.items : [];
      const shippingZoneName = order.shippingZone?.name || "بدون";
      const paymentMethodName = order.paymentMethodName || "-";
      const totalText = order.pricing?.displayTotal || money(order.pricing?.total || order.amountIls || 0);
      const subtotalText = order.pricing?.displaySubtotal || money(order.pricing?.subtotal || 0);
      const shippingText = order.pricing?.displayShipping || money(order.pricing?.shippingTotal || 0);
      const customerName = order.name || order.customerName || "-";
      const phone = order.phone || "-";

      return `
        <div class="order-card">
          <div class="order-head">
            <div>
              <div class="text-xl font-black text-[var(--primary)] mb-1">طلب #${escapeHtml(String(order.id || "").slice(-6).toUpperCase())}</div>
              <div class="text-xs text-gray-400 font-bold">${formatDate(order.createdAt)}</div>
            </div>

            <div class="flex items-center gap-2 flex-wrap">
              <span class="status-chip ${status.cls}">${status.text}</span>
            </div>
          </div>

          <div class="order-body">
            <div class="meta-grid mb-4">
              <div class="meta-box">
                <div class="k">كود التتبع</div>
                <div class="v">${escapeHtml(order.trackingCode || "-")}</div>
              </div>
              <div class="meta-box">
                <div class="k">طريقة الدفع</div>
                <div class="v">${escapeHtml(paymentMethodName)}</div>
              </div>
              <div class="meta-box">
                <div class="k">الاسم</div>
                <div class="v">${escapeHtml(customerName)}</div>
              </div>
              <div class="meta-box">
                <div class="k">رقم الجوال</div>
                <div class="v">${escapeHtml(phone)}</div>
              </div>
              <div class="meta-box">
                <div class="k">منطقة التوصيل</div>
                <div class="v">${escapeHtml(shippingZoneName)}</div>
              </div>
              <div class="meta-box">
                <div class="k">نوع الحساب</div>
                <div class="v">${order.customerUserId ? "مسجل دخول" : "بدون تسجيل دخول"}</div>
              </div>
            </div>

            <div class="text-base font-black text-[var(--primary)] mb-3">المنتجات</div>
            <div class="items-list">
              ${
                items.length
                  ? items.map(item => `
                    <div class="item-card">
                      <img src="${escapeHtml(item.image1 || 'https://via.placeholder.com/120x140?text=Item')}" alt="">
                      <div class="flex-1 min-w-0">
                        <div class="text-sm font-black text-gray-800 line-clamp-2">${escapeHtml(item.nameAr || item.nameEn || "منتج")}</div>
                        <div class="text-xs text-gray-400 font-bold mt-1">العدد: ${Number(item.qty || 1)}</div>
                        <div class="text-xs text-gray-500 font-black mt-1">
                          ${item.selectedColorName ? `اللون: ${escapeHtml(item.selectedColorName)} | ` : ""}
                          ${item.selectedSize ? `المقاس: ${escapeHtml(item.selectedSize)}` : "بدون مقاس"}
                        </div>
                      </div>
                      <div class="text-sm font-black text-[var(--primary)]">${money(Number(item.price || 0) * Number(item.qty || 1))}</div>
                    </div>
                  `).join("")
                  : `<div class="empty-box">لا توجد منتجات داخل هذا الطلب</div>`
              }
            </div>

            <div class="summary-total">
              <div class="w-full">
                <div class="flex items-center justify-between gap-3 text-sm mb-2">
                  <span class="text-gray-500 font-black">المبلغ الفرعي</span>
                  <span class="font-black">${escapeHtml(subtotalText)}</span>
                </div>
                <div class="flex items-center justify-between gap-3 text-sm mb-2">
                  <span class="text-gray-500 font-black">رسوم التوصيل</span>
                  <span class="font-black">${escapeHtml(shippingText)}</span>
                </div>
                <div class="flex items-center justify-between gap-3">
                  <span class="k">الإجمالي</span>
                  <span class="v">${escapeHtml(totalText)}</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    async function searchByTrackingCode(){
      const code = String(document.getElementById("trackingInput").value || "").trim().toUpperCase();
      const section = document.getElementById("searchResultSection");
      const box = document.getElementById("searchResultBox");

      if(!code){
        showToast("اكتب كود التتبع أولاً");
        return;
      }

      setOverlayLoading(true);
      try{
        const snap = await rtdb.ref(PATHS.orders).get();
        const raw = snap.val() || {};

        let found = null;
        Object.entries(raw).forEach(([id, value]) => {
          if(found) return;
          const trackingCode = String(value?.trackingCode || "").trim().toUpperCase();
          if(trackingCode === code){
            found = { id, ...(value || {}) };
          }
        });

        section.classList.remove("hidden-view");

        if(!found){
          box.innerHTML = `<div class="empty-box">لم يتم العثور على طلب بهذا الكود</div>`;
          showToast("لم يتم العثور على الطلب");
          return;
        }

        box.innerHTML = renderOrderCard(found);
        showToast("تم العثور على الطلب");
      }catch(e){
        console.error(e);
        section.classList.remove("hidden-view");
        box.innerHTML = `<div class="empty-box">تعذر تحميل الطلب الآن</div>`;
        showToast("تعذر تنفيذ البحث الآن");
      }finally{
        setOverlayLoading(false);
      }
    }

    async function loadMyOrders(){
      if(!currentUser){
        showToast("سجل دخولك أولاً");
        return;
      }

      const section = document.getElementById("myOrdersSection");
      const list = document.getElementById("myOrdersList");

      setOverlayLoading(true);
      try{
        const snap = await rtdb.ref(PATHS.orders).get();
        const raw = snap.val() || {};

        const orders = Object.entries(raw)
          .map(([id, value]) => ({ id, ...(value || {}) }))
          .filter(order => String(order.customerUserId || "") === String(currentUser.uid || ""))
          .sort((a, b) => Number(b.createdAt || 0) - Number(a.createdAt || 0));

        section.classList.remove("hidden-view");

        if(!orders.length){
          list.innerHTML = `<div class="empty-box">لا توجد طلبات مرتبطة بحسابك حتى الآن</div>`;
          return;
        }

        list.innerHTML = orders.map(renderOrderCard).join("");
      }catch(e){
        console.error(e);
        section.classList.remove("hidden-view");
        list.innerHTML = `<div class="empty-box">تعذر تحميل طلباتك الآن</div>`;
        showToast("تعذر تحميل الطلبات");
      }finally{
        setOverlayLoading(false);
      }
    }

    function authListener(){
      auth.onAuthStateChanged(async user => {
        currentUser = user || null;
        if(currentUser){
          await loadUserProfile();
        }else{
          currentUserProfile = null;
        }
        applyUserStateUI();
      });
    }

    async function initPage(){
      setLoadingBar(true);
      try{
        authListener();
