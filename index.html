<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tofan Store | متجر طوفان</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>

  <style>
    :root{
      --primary:#14454d;
      --accent:#f37021;
      --soft:#f3f6f8;
      --line:#e8edf2;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      font-family:'Cairo',sans-serif;
      background:#f7f8fa;
      overflow-x:hidden;
      color:#1f2937;
      -webkit-tap-highlight-color:transparent;
    }

    .hidden-scrollbar::-webkit-scrollbar{display:none}
    .hidden-scrollbar{scrollbar-width:none}

    .top-loading{
      position:fixed;
      top:0;
      right:0;
      height:3px;
      width:0;
      background:linear-gradient(90deg,var(--primary),var(--accent));
      z-index:9999;
      transition:width .3s ease;
    }

    .overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.45);
      display:none;
      z-index:2100;
      backdrop-filter:blur(3px);
    }

    /* ===== إصلاح القائمة الجانبية ===== */
    .sidebar{
      position:fixed;
      top:0;
      right:0;
      width:290px;
      max-width:86vw;
      height:100%;
      background:#fff;
      z-index:2200;
      transform:translateX(100%);
      transition:transform .24s cubic-bezier(.2,.8,.2,1);
      box-shadow:-10px 0 30px rgba(0,0,0,.12);
      overflow-y:auto;
      will-change:transform;
      backface-visibility:hidden;
      opacity:1;
      visibility:visible;
    }

    html[dir="ltr"] .sidebar{
      right:auto;
      left:0;
      transform:translateX(-100%);
      box-shadow:10px 0 30px rgba(0,0,0,.12);
    }

    .sidebar.open{
      transform:translateX(0) !important;
    }
    /* ===== نهاية الإصلاح ===== */

    .top-pane{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:76%;
      background:#fff;
      z-index:2150;
      border-radius:0 0 24px 24px;
      box-shadow:0 10px 30px rgba(0,0,0,.12);
      transform:translate3d(0,-105%,0);
      transition:transform .22s cubic-bezier(.2,.8,.2,1);
      will-change:transform;
      backface-visibility:hidden;
    }
    .top-pane.active{transform:translate3d(0,0,0)}

    .bottom-pane{
      position:fixed;
      bottom:0;
      left:0;
      width:100%;
      height:80%;
      background:#fff;
      z-index:2150;
      border-radius:24px 24px 0 0;
      box-shadow:0 -10px 30px rgba(0,0,0,.12);
      transform:translate3d(0,105%,0);
      transition:transform .22s cubic-bezier(.2,.8,.2,1);
      will-change:transform;
      backface-visibility:hidden;
    }
    .bottom-pane.active{transform:translate3d(0,0,0)}

    .sheet-layout{
      height:100%;
      display:flex;
      flex-direction:column;
    }

    .sheet-scroll{
      flex:1;
      min-height:0;
      overflow-y:auto;
    }

    .popup-sheet{
      position:fixed;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%) scale(.96);
      width:min(92vw,680px);
      max-height:80vh;
      overflow:auto;
      background:#fff;
      border-radius:24px;
      box-shadow:0 20px 60px rgba(0,0,0,.18);
      z-index:2300;
      opacity:0;
      pointer-events:none;
      transition:.18s ease;
      will-change:transform,opacity;
    }
    .popup-sheet.active{
      opacity:1;
      pointer-events:auto;
      transform:translate(-50%,-50%) scale(1);
    }

    .badge{
      position:absolute;
      top:-5px;
      right:-5px;
      background:var(--accent);
      color:#fff;
      font-size:10px;
      width:18px;
      height:18px;
      border-radius:999px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:800;
      border:2px solid #fff;
    }
    html[dir="ltr"] .badge{right:auto;left:-5px}

    .header{
      background:#fff;
      position:sticky;
      top:0;
      z-index:1900;
      box-shadow:0 1px 10px rgba(0,0,0,.04);
      padding:10px 14px;
    }

    .header-row{
      position:relative;
      display:flex;
      align-items:center;
      justify-content:space-between;
      min-height:42px;
    }

    .header-left,
    .header-right{
      display:flex;
      align-items:center;
      gap:12px;
      z-index:3;
      min-width:82px;
      transition:transform .2s ease;
    }

    .header-center{
      position:absolute;
      left:50%;
      transform:translateX(-50%);
      z-index:2;
      pointer-events:none;
    }

    .header-logo-shell{
      position:relative;
      width:94px;
      height:34px;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }
    .header-center img{
      height:34px;
      max-width:94px;
      object-fit:contain;
      display:block;
      opacity:0;
      transition:opacity .25s ease;
    }
    .header-center img.logo-loaded{
      opacity:1;
    }

    .sidebar-logo-shell{
      position:relative;
      width:40px;
      height:40px;
      border-radius:12px;
      overflow:hidden;
      flex:0 0 40px;
      background:#fff;
    }
    .sidebar-logo-shell img{
      width:100%;
      height:100%;
      object-fit:contain;
      opacity:0;
      transition:opacity .25s ease;
    }
    .sidebar-logo-shell img.logo-loaded{
      opacity:1;
    }

    .icon-btn{
      background:transparent;
      border:none;
      padding:0;
      margin:0;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
    }

    .lang-btn{
      background:#f3f4f6;
      border:none;
      border-radius:10px;
      padding:5px 10px;
      font-size:12px;
      font-weight:800;
      color:#4b5563;
      cursor:pointer;
    }

    .search-results-box{
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:18px;
      box-shadow:0 10px 28px rgba(0,0,0,.08);
      padding:10px;
      margin-top:10px;
      display:none;
      position:relative;
      z-index:1800;
    }

    .search-dropdown{
      background:#fff;
      border-bottom:1px solid #eef2f6;
      box-shadow:0 8px 24px rgba(0,0,0,.05);
      max-height:0;
      overflow:hidden;
      opacity:0;
      transition:max-height .22s ease, opacity .18s ease, padding .18s ease;
      padding:0 14px;
    }
    .search-dropdown.open{
      max-height:230px;
      opacity:1;
      padding:10px 14px 12px;
    }

    .search-input{
      width:100%;
      height:42px;
      border:none;
      outline:none;
      background:#f3f4f6;
      border-radius:999px;
      padding:0 14px;
      font-size:13px;
      font-weight:800;
      color:#111827;
    }

    .hero-wrap,
    .extra-banner-wrap{
      position:relative;
      overflow:hidden;
      background:#eef2f7;
      min-height:160px;
    }
    .hero-wrap img,
    .extra-banner-wrap img{
      width:100%;
      display:block;
      object-fit:cover;
    }

    .section-title-line{
      height:1px;
      background:#e5e7eb;
      flex:1;
    }

    .catSwiper{overflow:hidden}

    .cat-icon-wrapper{
      width:76px;
      height:76px;
      background:#fff;
      border:1px solid #eef2f6;
      border-radius:20px;
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--primary);
      transition:.25s ease;
      box-shadow:0 4px 12px rgba(0,0,0,.03);
      overflow:hidden;
      will-change:transform;
    }
    .cat-icon-wrapper img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }
    .cat-card:hover .cat-icon-wrapper{
      background:var(--primary);
      color:#fff;
      transform:translateX(-5px);
    }
    html[dir="ltr"] .cat-card:hover .cat-icon-wrapper{
      transform:translateX(5px);
    }

    .swiper-pagination-bullet{
      width:18px !important;
      height:4px !important;
      border-radius:999px !important;
      background:#cbd5e1 !important;
      opacity:1 !important;
      transition:.25s ease !important;
    }
    .swiper-pagination-bullet-active{
      width:34px !important;
      background:var(--primary) !important;
    }

    .rounded-banner{
      overflow:hidden;
      background:#fff;
      border:none;
      border-radius:0;
      box-shadow:none;
    }

    .product-card{
      background:#fff;
      border:1px solid #eef2f6;
      border-radius:22px;
      overflow:hidden;
      box-shadow:0 6px 18px rgba(0,0,0,.04);
      transition:transform .2s ease, box-shadow .2s ease, opacity .22s ease;
      position:relative;
      opacity:0;
      transform:translateY(20px);
      will-change:transform,opacity;
      backface-visibility:hidden;
      cursor:pointer;
    }
    .product-card.visible{
      opacity:1;
      transform:translateY(0);
    }
    .product-card:hover{
      transform:translateY(-4px);
      box-shadow:0 16px 30px rgba(0,0,0,.08);
    }

    .img-container{
      position:relative;
      aspect-ratio:1/1.08;
      overflow:hidden;
      background:#f3f4f6;
    }
    .img-container img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .front-img,.back-img{
      position:absolute;
      inset:0;
      transition:opacity .25s ease, transform .25s ease;
      will-change:opacity,transform;
      backface-visibility:hidden;
    }
    .back-img{
      opacity:0;
      transform:scale(1.02);
    }

    @media (hover:hover){
      .product-card:hover .back-img{
        opacity:1;
        transform:scale(1);
      }
      .product-card:hover .front-img{
        opacity:0;
      }
    }

    .product-card.touch-active .back-img{
      opacity:1;
      transform:scale(1);
    }
    .product-card.touch-active .front-img{
      opacity:0;
    }

    .product-watermark{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      pointer-events:none;
      z-index:3;
    }
    .product-watermark img{
      width:74px;
      height:74px;
      object-fit:contain;
      opacity:.11;
      filter:drop-shadow(0 6px 18px rgba(0,0,0,.16));
    }

    .product-image-loader,
    .banner-image-loader,
    .logo-image-loader{
      position:absolute;
      inset:0;
      background:linear-gradient(90deg,#f1f5f9 25%,#e5e7eb 37%,#f1f5f9 63%);
      background-size:400% 100%;
      animation:shimmer 1.2s infinite linear;
      z-index:2;
    }

    .wish-btn{
      position:absolute;
      top:10px;
      right:10px;
      width:36px;
      height:36px;
      border-radius:999px;
      background:rgba(255,255,255,.92);
      backdrop-filter:blur(6px);
      box-shadow:0 6px 16px rgba(0,0,0,.08);
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:4;
      border:none;
      cursor:pointer;
    }
    html[dir="ltr"] .wish-btn{
      right:auto;
      left:10px;
    }

    .discount-badge{
      position:absolute;
      top:10px;
      left:10px;
      min-width:54px;
      height:28px;
      padding:0 12px;
      border-radius:999px;
      background:var(--accent);
      color:#fff;
      z-index:4;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:11px;
      font-weight:900;
      box-shadow:0 6px 16px rgba(243,112,33,.26);
    }
    html[dir="ltr"] .discount-badge{
      left:auto;
      right:10px;
    }

    .hollow-cart-btn{
      width:100%;
      height:42px;
      border-radius:15px;
      display:flex;
      align-items:center;
      justify-content:center;
      transition:.2s ease;
      cursor:pointer;
      font-weight:800;
      border:2px solid var(--primary);
      color:var(--primary);
      background:transparent;
    }

    .empty-box{
      background:#fff;
      border:1px dashed #dbe3eb;
      border-radius:24px;
      padding:24px;
      text-align:center;
      color:#94a3b8;
      font-weight:700;
    }

    .dashed-sep{border-top:1px dashed #d1d5db}

    .auth-chip{
      background:#f8fafc;
      border:1px solid #e5e7eb;
      border-radius:999px;
      padding:10px 14px;
      font-size:12px;
      font-weight:800;
      display:flex;
      align-items:center;
      gap:8px;
      cursor:pointer;
      transition:.2s ease;
      width:100%;
      justify-content:space-between;
    }

    .bottom-nav{
      position:fixed;
      bottom:0;
      width:100%;
      background:rgba(255,255,255,.95);
      backdrop-filter:blur(10px);
      border-top:1px solid #edf2f7;
      display:flex;
      justify-content:space-around;
      padding:12px 6px calc(12px + env(safe-area-inset-bottom));
      z-index:2000;
      box-shadow:0 -8px 24px rgba(0,0,0,.06);
    }

    .cart-item-check{
      width:18px;
      height:18px;
      accent-color:var(--primary);
    }

    .cart-checkout-bar{
      position:sticky;
      bottom:0;
      left:0;
      width:100%;
      padding:12px 0 calc(10px + env(safe-area-inset-bottom));
      background:#fff;
      border-top:1px solid #eef2f6;
      margin-top:10px;
      z-index:3;
    }

    .primary-btn,.secondary-btn{
      width:100%;
      border-radius:16px;
      padding:13px 16px;
      font-weight:900;
      cursor:pointer;
      border:none;
    }
    .primary-btn{
      background:var(--primary);
      color:#fff;
      box-shadow:0 10px 22px rgba(20,69,77,.18);
    }
    .secondary-btn{
      background:#f8fafc;
      color:#334155;
      border:1px solid #e5e7eb;
    }

    .toast{
      position:fixed;
      bottom:90px;
      left:50%;
      transform:translateX(-50%);
      background:#111827;
      color:#fff;
      border-radius:999px;
      padding:12px 18px;
      z-index:9999;
      font-size:13px;
      font-weight:800;
      animation:toastUp .16s ease;
      white-space:nowrap;
      max-width:90%;
      overflow:hidden;
      text-overflow:ellipsis;
      will-change:transform,opacity;
    }

    .section-slider{position:relative}
    .section-slider .swiper-button-prev,
    .section-slider .swiper-button-next{
      width:36px;
      height:36px;
      border-radius:999px;
      background:rgba(17,24,39,.8);
      color:#fff;
    }
    .section-slider .swiper-button-prev:after,
    .section-slider .swiper-button-next:after{
      font-size:13px;
      font-weight:900;
    }

    .hero-hidden{display:none !important}

    .price-row{
      display:flex;
      align-items:center;
      gap:8px;
      margin-top:4px;
      margin-bottom:8px;
      flex-wrap:wrap;
    }
    .old-price{
      font-size:13px;
      color:#b9c0c8;
      text-decoration:line-through;
      font-weight:800;
    }
    .new-price{
      font-size:16px;
      color:var(--primary);
      font-weight:900;
    }

    .store-footer{
      margin:30px 16px 0;
      background:#fff;
      border:1px solid #e9eef3;
      border-radius:28px;
      box-shadow:0 10px 30px rgba(0,0,0,.04);
      overflow:hidden;
    }

    .footer-head{
      padding:22px 18px 10px;
      text-align:center;
    }

    .footer-title{
      color:var(--primary);
      font-size:20px;
      font-weight:900;
      margin-bottom:6px;
    }

    .footer-sub{
      color:#94a3b8;
      font-size:12px;
      font-weight:800;
    }

    .footer-section{
      padding:18px;
      border-top:1px solid #eef2f6;
    }

    .footer-section-title{
      font-size:14px;
      font-weight:900;
      color:var(--primary);
      margin-bottom:14px;
      text-align:center;
    }

    .social-grid{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      justify-content:center;
    }

    .social-link{
      width:50px;
      height:50px;
      border-radius:16px;
      border:1px solid #e7edf3;
      background:#f8fafc;
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--primary);
      transition:.2s ease;
      box-shadow:0 4px 12px rgba(0,0,0,.03);
    }
    .social-link:hover{
      transform:translateY(-2px);
      background:var(--primary);
      color:#fff;
      border-color:var(--primary);
    }

    .payment-icons-grid{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      justify-content:center;
      align-items:center;
    }

    .payment-icon-card{
      background:#fff;
      border:1px solid #e9eef3;
      border-radius:18px;
      padding:12px 18px;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:64px;
      min-width:110px;
    }
    .payment-icon-card img{
      max-width:100%;
      max-height:36px;
      object-fit:contain;
      display:block;
    }

    .footer-copy{
      text-align:center;
      color:#94a3b8;
      font-size:12px;
      font-weight:800;
      padding:16px 18px 20px;
      border-top:1px solid #eef2f6;
      background:#fbfcfd;
    }

    .desktop-products-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:16px;
    }

    @media (min-width:1024px){
      .desktop-products-grid{
        grid-template-columns:repeat(4,minmax(0,1fr));
      }
      .product-card .img-container{
        aspect-ratio:1/1.02;
      }
    }

    @media (min-width:1400px){
      .desktop-products-grid{
        grid-template-columns:repeat(5,minmax(0,1fr));
      }
    }

    @keyframes toastUp{
      from{opacity:0;transform:translate(-50%,18px)}
      to{opacity:1;transform:translate(-50%,0)}
    }

    @keyframes shimmer{
      0%{background-position:100% 0}
      100%{background-position:-100% 0}
    }

    @media (max-width:420px){
      .header-center img{height:32px}
      .header-left,.header-right{gap:10px;min-width:72px}
      .search-dropdown.open{max-height:250px}
    }
  </style>
</head>
<body>

  <div id="topLoading" class="top-loading"></div>
  <div id="overlay" class="overlay" onclick="closeAll()"></div>

  <aside id="sidebar-menu" class="sidebar p-6 flex flex-col">
    <div class="flex justify-between items-center mb-8">
      <div class="flex items-center gap-3">
        <div class="sidebar-logo-shell">
          <div class="logo-image-loader" id="sidebarLogoLoader"></div>
          <img id="sidebarLogo" src="" alt="logo">
        </div>
        <div>
          <div id="sidebarStoreName" class="font-black text-base text-[#14454d]">متجر طوفان</div>
          <div class="text-[11px] text-gray-400 font-bold">TOFAN STORE</div>
        </div>
      </div>
      <button onclick="closeAll()" class="text-3xl text-gray-300">&times;</button>
    </div>

    <div id="sidebarUserBox" class="mb-6"></div>

    <div class="space-y-3 mb-5">
      <button class="auth-chip" onclick="goOrderPage()">
        <span class="flex items-center gap-2">
          <svg class="w-5 h-5 text-[#14454d]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
          <span id="sidebarProfileText">الحساب والطلبات</span>
        </span>
        <span class="text-gray-400 text-xs font-bold" id="sidebarOpenText1">فتح</span>
      </button>

      <button class="auth-chip" onclick="openBottomPane('cart')">
        <span class="flex items-center gap-2">
          <svg class="w-5 h-5 text-[#14454d]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
          <span data-i18n="cart">السلة</span>
        </span>
        <span id="sidebarCartCount" class="text-gray-400 text-xs font-bold">0</span>
      </button>

      <button class="auth-chip" onclick="openBottomPane('wish')">
        <span class="flex items-center gap-2">
          <svg class="w-5 h-5 text-[#14454d]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
          <span data-i18n="wish">الأمنيات</span>
        </span>
        <span id="sidebarWishCount" class="text-gray-400 text-xs font-bold">0</span>
      </button>

      <button class="auth-chip" onclick="window.location.href='admin.html'">

    function t(key){ return i18n[lang]?.[key] || key; }

    function setLoadingBar(on){
      const el = document.getElementById("topLoading");
      if(on){
        el.style.width = "65%";
      }else{
        el.style.width = "100%";
        setTimeout(() => el.style.width = "0%", 260);
      }
    }

    function showToast(msg){
      const old = document.querySelector(".toast");
      if(old) old.remove();
      const tEl = document.createElement("div");
      tEl.className = "toast";
      tEl.textContent = msg;
      document.body.appendChild(tEl);
      setTimeout(() => {
        tEl.style.opacity = "0";
        tEl.style.transform = "translate(-50%,16px)";
        setTimeout(() => tEl.remove(), 180);
      }, 1800);
    }

    function money(v){ return `${Number(v || 0).toFixed(2)} ₪`; }

    function escapeHtml(str){
      return String(str ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function normalizeCategories(raw){
      return Object.entries(raw || {}).map(([id, v]) => ({
        id,
        nameAr: v.nameAr || v.name || "",
        nameEn: v.nameEn || "",
        image: v.image || "",
        icon: v.icon || "box",
        order: Number(v.order || 0),
        enabled: v.enabled !== false
      })).sort((a,b) => a.order - b.order);
    }

    function normalizeProducts(raw){
      return Object.entries(raw || {}).map(([id, v]) => ({
        id,
        categoryId: v.categoryId || v.category || "",
        nameAr: v.nameAr || v.name || "",
        nameEn: v.nameEn || "",
        descAr: v.descAr || v.desc || "",
        descEn: v.descEn || "",
        price: Number(v.price || 0),
        oldPrice: Number(v.oldPrice || 0),
        image1: v.image1 || v.image || v.front || "",
        image2: v.image2 || "",
        order: Number(v.order || 0),
        enabled: v.enabled !== false,
        createdAt: Number(v.createdAt || 0)
      })).filter(p => p.enabled).sort((a,b) => (a.order - b.order) || (b.createdAt - a.createdAt));
    }

    function normalizeSections(raw){
      return Object.entries(raw || {}).map(([id, v]) => ({
        id,
        type: v.type || "banner",
        titleAr: v.titleAr || v.title || "",
        titleEn: v.titleEn || "",
        image: v.image || "",
        images: Array.isArray(v.images) ? v.images : [],
        link: v.link || "#",
        placement: v.placement || "after_categories",
        order: Number(v.order || 0),
        enabled: v.enabled !== false
      })).filter(s => s.enabled).sort((a,b) => a.order - b.order);
    }

    function normalizeMenuItems(raw){
      return Object.entries(raw || {}).map(([id, v]) => ({
        id,
        titleAr: v.titleAr || v.title || "",
        titleEn: v.titleEn || "",
        type: v.type || "link",
        value: v.value || "",
        popupHtml: v.popupHtml || "",
        order: Number(v.order || 0),
        enabled: v.enabled !== false
      })).filter(i => i.enabled).sort((a,b) => a.order - b.order);
    }

    function normalizePaymentMethods(raw){
      return Object.entries(raw || {}).map(([id, v]) => ({
        id,
        name: v.name || "",
        image: v.image || "",
        enabled: v.enabled !== false,
        order: Number(v.order || 0)
      })).filter(x => x.enabled && x.image).sort((a,b) => a.order - b.order);
    }

    function normalizeSocialLinks(raw){
      return Object.entries(raw || {}).map(([id, v]) => ({
        id,
        platform: String(v.platform || "").toLowerCase().trim(),
        url: v.url || v.link || "",
        enabled: v.enabled !== false,
        order: Number(v.order || 0)
      })).filter(x => x.enabled && x.platform && x.url).sort((a,b) => a.order - b.order);
    }

    function closeSearchBar(){
      document.getElementById("searchDropdown").classList.remove("open");
      document.getElementById("searchInput").value = "";
      document.getElementById("searchResultsBox").style.display = "none";
      document.getElementById("searchResultsBox").innerHTML = "";
    }

    function toggleSearchBar(event){
      if(event) event.stopPropagation();
      const box = document.getElementById("searchDropdown");
      const isOpen = box.classList.contains("open");
      if(isOpen){
        closeSearchBar();
      }else{
        closeAll(false);
        box.classList.add("open");
        setTimeout(() => document.getElementById("searchInput").focus(), 80);
      }
    }

    document.addEventListener("click", function(e){
      const header = document.getElementById("siteHeader");
      const search = document.getElementById("searchDropdown");
      if(!header.contains(e.target) && !search.contains(e.target)){
        closeSearchBar();
      }
    });

    /* ===== إصلاح الفتح فعلياً ===== */
    function openSidebar(){
      closeAll(false);
      document.getElementById("sidebar-menu").classList.add("open");
      document.getElementById("overlay").style.display = "block";
    }
    /* ===== نهاية الإصلاح ===== */

    function openBottomPane(id){
      closeAll(false);
      document.getElementById(`${id}-pane`).classList.add("active");
      document.getElementById("overlay").style.display = "block";
      if(id === "wish") renderWishlist();
      if(id === "cart") renderCart();
    }

    function closeMenuPopup(){
      document.getElementById("menuPopup").classList.remove("active");
    }

    function openMenuPopup(title, html){
      document.getElementById("menuPopupTitle").textContent = title || "نافذة";
      document.getElementById("menuPopupBody").innerHTML = html || "";
      document.getElementById("menuPopup").classList.add("active");
    }

    function closeAll(closeSearchToo = true){
      document.getElementById("sidebar-menu").classList.remove("open");
      document.querySelectorAll(".top-pane, .bottom-pane").forEach(p => p.classList.remove("active"));
      const extra = document.getElementById("category-all-pane");
      if(extra) extra.classList.remove("active");
      closeMenuPopup();
      document.getElementById("overlay").style.display = "none";
      if(closeSearchToo) closeSearchBar();
    }

    function setImgWithLoader(imgId, loaderId, url, fallback = fallbackLogo){
      const img = document.getElementById(imgId);
      const loader = document.getElementById(loaderId);
      if(!img || !loader) return;

      img.classList.remove("logo-loaded");
      loader.style.display = "block";

      img.onload = () => {
        loader.style.display = "none";
        img.classList.add("logo-loaded");
      };

      img.onerror = () => {
        if (img.src !== fallback) {
          img.src = fallback;
        } else {
          loader.style.display = "none";
          img.classList.add("logo-loaded");
        }
      };

      img.src = url || fallback;
    }

    function updateStoreUI(){
      const logo = storeSettings.storeLogoUrl || fallbackLogo;
      const banner = storeSettings.bannerTopBannerUrl || storeSettings.bannerTopUrl || "";
      const name = lang === "ar"
        ? (storeSettings.storeName || "متجر طوفان")
        : (storeSettings.storeNameEn || storeSettings.storeName || "Tofan Store");

      setImgWithLoader("headerLogo", "headerLogoLoader", logo, fallbackLogo);
      setImgWithLoader("sidebarLogo", "sidebarLogoLoader", logo, fallbackLogo);

      document.getElementById("sidebarStoreName").textContent = name;
      document.getElementById("footerStoreTitle").textContent = name;
      document.getElementById("footerStoreSub").textContent = t("footer-sub");
      document.getElementById("socialFooterTitle").textContent = t("follow-us");
      document.getElementById("paymentFooterTitle").textContent = t("payment-methods");
      document.getElementById("footerCopyText").textContent = `${t("rights")} - ${name}`;
      document.getElementById("sidebarOpenText1").textContent = t("open");
      document.getElementById("sidebarOpenText2").textContent = t("open");

      const heroSection = document.getElementById("heroSection");
      const topBanner = document.getElementById("topBanner");
      const topBannerLoader = document.getElementById("topBannerLoader");

      if(banner){
        heroSection.classList.remove("hero-hidden");
        topBannerLoader.style.display = "block";
        topBanner.onload = hideBannerLoader;
        topBanner.onerror = hideBannerLoader;
        topBanner.src = banner;
      }else{
        heroSection.classList.add("hero-hidden");
        topBanner.removeAttribute("src");
      }
    }

    function getCategoryName(cat){
      return lang === "ar" ? (cat.nameAr || "") : (cat.nameEn || cat.nameAr || "");
    }

    function getProductName(p){
      return lang === "ar" ? (p.nameAr || "") : (p.nameEn || p.nameAr || "");

    function getMenuTitle(item){

    function getDiscountPercent(price, oldPrice){
      const p = Number(price || 0);
      const o = Number(oldPrice || 0);
      if(!(o > p && p > 0)) return 0;
      return Math.round(((o - p) / o) * 100);
    }

    function renderUserBox(){
      const box = document.getElementById("sidebarUserBox");

      if(currentUser){
        const name = currentUser.displayName || currentUser.email || "User";
        box.innerHTML = `
          <div class="bg-[#14454d]/5 border border-[#14454d]/10 rounded-3xl p-4">
            <div class="text-xs text-gray-400 font-bold mb-1">${t("welcome")}</div>
            <div class="font-black text-[#14454d] text-base mb-3">${escapeHtml(name)}</div>
            <button onclick="window.location.href='order.html'" class="w-full bg-[#14454d] text-white py-3 rounded-2xl font-black">${t("open-account")}</button>
          </div>
        `;

      }else{
        box.innerHTML = `
          <div class="bg-gray-50 border border-gray-100 rounded-3xl p-4">
            <div class="text-sm text-gray-500 font-bold mb-3">${t("account-login-text")}</div>
            <button onclick="sessionStorage.setItem('login_redirect_1885','order.html'); window.location.href='login.html'" class="w-full bg-[#14454d] text-white py-3 rounded-2xl font-black">${t("login")}</button>
          </div>
        `;
        document.getElementById("sidebarProfileText").textContent = t("account-orders-title");

    function handleMenuItemClick(id){
      const item = menuItems.find(x => x.id === id);
      if(!item) return;

      closeAll();

      if(item.type === "link"){
        if(/^https?:\/\//i.test(item.value)){
          window.open(item.value, "_blank");
        }else{
          window.location.href = item.value || "#";
        }
        return;
      }

      if(item.type === "internal_page"){
        window.location.href = item.value || "index.html";
        return;
      }

      if(item.type === "category"){
        setTimeout(() => scrollToCategorySection(item.value), 120);
        return;
      }

      if(item.type === "popup_html"){
        document.getElementById("overlay").style.display = "block";
        openMenuPopup(getMenuTitle(item), item.popupHtml || "");
      }
    }

    function renderSidebarDynamicMenu(){
      const wrap = document.getElementById("sidebarDynamicMenuWrap");
      if(!menuItems.length){
        wrap.innerHTML = "";
        return;
      }

      wrap.innerHTML = `
        <div class="space-y-3">
          ${menuItems.map(item => `
            <button class="auth-chip" onclick="handleMenuItemClick('${item.id}')">
              <span class="truncate">${escapeHtml(getMenuTitle(item))}</span>
              <span class="text-gray-400 text-xs font-bold">${t("open")}</span>
            </button>
          `).join("")}
        </div>
      `;
    }

    function renderFooterSection(){
      const footer = document.getElementById("storeFooterSection");
      const socialWrap = document.getElementById("socialFooterWrap");
      const paymentWrap = document.getElementById("paymentFooterWrap");
      const socialGrid = document.getElementById("socialLinksGrid");
      const paymentGrid = document.getElementById("footerPaymentMethodsGrid");

      const hasSocial = socialLinks.length > 0;
      const hasPayments = paymentMethods.length > 0;

      socialWrap.style.display = hasSocial ? "" : "none";
      paymentWrap.style.display = hasPayments ? "" : "none";

      socialGrid.innerHTML = hasSocial ? socialLinks.map(item => `
        <a href="${escapeHtml(item.url)}" target="_blank" rel="noopener noreferrer" class="social-link" aria-label="${escapeHtml(item.platform)}" title="${escapeHtml(item.platform)}">
          ${getSocialIconSvg(item.platform)}
        </a>
      `).join("") : "";

      paymentGrid.innerHTML = hasPayments ? paymentMethods.map(method => `
        <div class="payment-icon-card">
          <img src="${escapeHtml(method.image)}" alt="${escapeHtml(method.name || 'payment method')}" loading="lazy" decoding="async" referrerpolicy="no-referrer">
        </div>
      `).join("") : "";

      if(hasSocial || hasPayments){
        footer.classList.remove("hidden");
      }else{
        footer.classList.add("hidden");
      }
    }

    function applyLanguageTexts(){
      document.documentElement.dir = lang === "ar" ? "rtl" : "ltr";
      localStorage.setItem(LOCAL_KEYS.lang, lang);

      document.getElementById("lang-btn").innerText = lang === "ar" ? "E" : "ع";
      document.getElementById("searchInput").placeholder = t("search-placeholder");

      document.querySelectorAll("[data-i18n]").forEach(el => {
        const key = el.getAttribute("data-i18n");
        el.textContent = t(key);
      });

      updateStoreUI();
      renderUserBox();
      renderSidebarDynamicMenu();
      renderCategoriesSlider();
      renderProductsSections();
      renderCart();
      renderWishlist();
      renderDynamicSections();
      renderFooterSection();
    }

    function performSearch(query){
      const box = document.getElementById("searchResultsBox");
      const q = String(query || "").trim().toLowerCase();

      if(!q){
        box.style.display = "none";
        box.innerHTML = "";
        return;
      }

      const filtered = products.filter(p => {
        const cat = categories.find(c => c.id === p.categoryId);
        const text = [p.nameAr, p.nameEn, cat?.nameAr || "", cat?.nameEn || ""].join(" ").toLowerCase();
        return text.includes(q);
      }).slice(0, 8);

      if(!filtered.length){
        box.style.display = "block";
        box.innerHTML = `<div class="text-sm font-bold text-gray-400 p-2">${t("search-empty")}</div>`;
        return;
      }

      box.style.display = "block";
      box.innerHTML = `
        <div class="text-xs font-black text-[#14454d] px-2 py-1">${t("search-title")}</div>
        <div class="space-y-2">
          ${filtered.map(p => `
            <button onclick="scrollToProductCard('${p.id}')" class="w-full ${lang==='ar' ? 'text-right' : 'text-left'} flex items-center gap-3 p-2 rounded-2xl hover:bg-gray-50">
              <img src="${escapeHtml((p.image1 || 'https://via.placeholder.com/100x120?text=Image'))}" class="w-12 h-14 object-cover rounded-xl border" loading="lazy">
              <div class="flex-1 min-w-0">
                <div class="text-xs font-black text-gray-800 truncate">${escapeHtml(getProductName(p))}</div>
                <div class="text-[11px] text-[#14454d] font-black mt-1">${money(p.price)}</div>
              </div>
            </button>
          `).join("")}
        </div>
      `;
    }

    function scrollToProductCard(productId){
      const el = document.getElementById(`product-card-${productId}`);
      if(el){
        closeSearchBar();
        window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - 80, behavior: "smooth" });
      }
    }

    function renderCategoriesSlider(){
      const wrapper = document.getElementById("categories-swiper-wrapper");
      const enabledCats = categories.filter(c => c.enabled !== false);

      if(!enabledCats.length){
        wrapper.innerHTML = `<div class="swiper-slide"><div class="empty-box">${t("empty-products")}</div></div>`;
        refreshSwiper();
        renderSidebarCategories();
        return;
      }

      const groups = [];
      for(let i = 0; i < enabledCats.length; i += 3){
        groups.push(enabledCats.slice(i, i + 3));
      }

      wrapper.innerHTML = groups.map(group => `
        <div class="swiper-slide">
          <div class="grid grid-cols-3 gap-3">
            ${group.map(cat => `
              <button class="cat-card flex flex-col items-center gap-2" onclick="scrollToCategorySection('${escapeHtml(cat.id)}')">
                <div class="cat-icon-wrapper">
                  ${cat.image
                    ? `<img src="${escapeHtml(cat.image)}" loading="lazy" decoding="async" referrerpolicy="no-referrer">`
                    : getCategoryIconSvg(cat.icon || "box")
                  }
                </div>
                <span class="text-xs font-bold text-gray-600 line-clamp-1">${escapeHtml(getCategoryName(cat))}</span>
              </button>
            `).join("")}
            ${group.length < 3 ? new Array(3 - group.length).fill(0).map(() => `<div></div>`).join("") : ""}
          </div>
        </div>
      `).join("");

      refreshSwiper();
      renderSidebarCategories();
    }

    function refreshSwiper(){
      if(catSwiper) catSwiper.destroy(true, true);
      catSwiper = new Swiper(".catSwiper", {
        loop: true,
        pagination: { el: ".swiper-pagination", clickable: true },
        autoplay: { delay: 1000, disableOnInteraction: false },
        speed: 500
      });
    }

    function renderSidebarCategories(){
      const box = document.getElementById("sidebarCategories");
      const enabledCats = categories.filter(c => c.enabled !== false);

      if(!enabledCats.length){
        box.innerHTML = `<div class="text-gray-400 text-sm">${t("empty-products")}</div>`;
        return;
      }

      box.innerHTML = enabledCats.map(cat => `
        <button onclick="closeAll(); setTimeout(() => scrollToCategorySection('${escapeHtml(cat.id)}'), 120)" class="${lang==='ar' ? 'text-right' : 'text-left'} hover:text-[#14454d] transition-colors">
          ${escapeHtml(getCategoryName(cat))}
        </button>
      `).join("");
    }

    function renderProductCard(p){
      const discount = getDiscountPercent(p.price, p.oldPrice);

      return `
        <div id="product-card-${p.id}" class="product-card visible">
          <div class="img-container">
            <div class="product-image-loader"></div>

            ${discount > 0 ? `<div class="discount-badge">${discount}% -</div>` : ""}

            <img src="${escapeHtml(p.image1 || 'https://via.placeholder.com/500x700?text=No+Image')}"
                 class="front-img"
                 loading="lazy"
                 decoding="async"
                 referrerpolicy="no-referrer"
                 onload="hideImageLoader(this)"
                 onerror="this.onerror=null;this.src='https://via.placeholder.com/500x700?text=No+Image';hideImageLoader(this)">
          </div>

          <div class="p-3">
            <h4 class="text-[14px] font-black text-gray-800 leading-6 line-clamp-2 min-h-[48px] mb-1">${escapeHtml(getProductName(p))}</h4>

            <div class="price-row">
              ${p.oldPrice > p.price ? `<span class="old-price">${money(p.oldPrice)}</span>` : ``}
              <span class="new-price">${money(p.price)}</span>
            </div>

            <button onclick="event.stopPropagation()" class="hollow-cart-btn">+</button>
          </div>
        </div>
      `;
    }

    function renderSectionBlock(section, index){
      const title = getSectionTitle(section);
      const images = section.images.length ? section.images : (section.image ? [section.image] : []);
      if(!images.length) return "";

      if(section.type === "slider"){
        const swId = `extra-swiper-${index}`;
        return `
          <section class="mb-6">
            ${title ? `<h3 class="font-black text-[#14454d] text-lg mb-3 px-4">${escapeHtml(title)}</h3>` : ``}
            <div class="rounded-banner section-slider">
              <div class="swiper ${swId}">
                <div class="swiper-wrapper">
                  ${images.map(img => `
                    <div class="swiper-slide">
                      <a href="${escapeHtml(section.link || '#')}">
                        <div class="extra-banner-wrap">
                          <img src="${escapeHtml(img)}" alt="section image" loading="lazy" decoding="async" referrerpolicy="no-referrer">
                        </div>
                      </a>
                    </div>
                  `).join("")}
                </div>
                ${images.length > 1 ? `
                  <div class="swiper-button-prev"></div>
                  <div class="swiper-button-next"></div>
                  <div class="swiper-pagination"></div>
                ` : ``}
              </div>
            </div>
          </section>
        `;
      }

      return `
        <section class="mb-6">
          ${title ? `<h3 class="font-black text-[#14454d] text-lg mb-3 px-4">${escapeHtml(title)}</h3>` : ``}
          <a href="${escapeHtml(section.link || '#')}" class="block rounded-banner">
            <div class="extra-banner-wrap">
              <img src="${escapeHtml(images[0])}" alt="banner" loading="lazy" decoding="async" referrerpolicy="no-referrer">
            </div>
          </a>
        </section>
      `;
    }

    function renderDynamicSections(){
      document.getElementById("topDynamicSections").innerHTML =
        pageSections.filter(s => s.placement === "top").map((s, i) => renderSectionBlock(s, `top-${i}`)).join("");

      document.getElementById("afterCategoriesSections").innerHTML =
        pageSections.filter(s => s.placement === "after_categories").map((s, i) => renderSectionBlock(s, `mid-${i}`)).join("");

      document.getElementById("bottomDynamicSections").innerHTML =
        pageSections.filter(s => s.placement === "bottom").map((s, i) => renderSectionBlock(s, `bottom-${i}`)).join("");

      initDynamicSwipers();
    }

    function initDynamicSwipers(){
      dynamicSwipers.forEach(sw => { try{ sw.destroy(true, true); }catch(e){} });
      dynamicSwipers = [];

      document.querySelectorAll(".section-slider .swiper").forEach(swEl => {
        dynamicSwipers.push(new Swiper(swEl, {
          loop: true,
          speed: 500,
          autoplay: { delay: 2500, disableOnInteraction: false },
          pagination: { el: swEl.querySelector(".swiper-pagination"), clickable: true },
          navigation: { nextEl: swEl.querySelector(".swiper-button-next"), prevEl: swEl.querySelector(".swiper-button-prev") }
        }));
      });
    }

    function renderProductsSections(){
      const holder = document.getElementById("products-sections");
      const enabledCats = categories.filter(c => c.enabled !== false);

      if(!enabledCats.length){
        holder.innerHTML = `<div class="empty-box">${t("empty-products")}</div>`;
        return;
      }

      const parts = [];
      enabledCats.forEach((cat) => {
        const catProducts = products.filter(p => p.categoryId === cat.id);
        if(!catProducts.length) return;

        parts.push(`
          <section class="mb-8" id="category-section-${escapeHtml(cat.id)}">
            <div class="flex justify-between items-center mb-4">
              <div class="flex items-center gap-3">
                ${cat.image
                  ? `<div class="w-10 h-10 rounded-2xl overflow-hidden border bg-white"><img src="${escapeHtml(cat.image)}" class="w-full h-full object-cover" loading="lazy" decoding="async"></div>`
                  : `<div class="w-10 h-10 rounded-2xl border bg-white flex items-center justify-center text-[#14454d]">${getCategoryIconSvg(cat.icon || "box")}</div>`
                }
                <h3 class="font-black text-[#14454d] text-lg">${escapeHtml(getCategoryName(cat))}</h3>
              </div>
            </div>

            <div class="desktop-products-grid">
              ${catProducts.slice(0,8).map((p) => renderProductCard(p)).join("")}
            </div>
          </section>
        `);
      });

      holder.innerHTML = parts.join("") || `<div class="empty-box">${t("empty-products")}</div>`;
    }

    function hideImageLoader(img){
      const box = img.closest(".img-container");
      if(!box) return;
      const loader = box.querySelector(".product-image-loader");
      if(loader) loader.style.display = "none";
    }

    function hideBannerLoader(){
      const loader = document.getElementById("topBannerLoader");
      if(loader) loader.style.display = "none";
    }

    function renderCart(){
      const container = document.getElementById("cart-content");
      if(!cart.length){
        container.innerHTML = `<div class="empty-box mt-4">${t("empty-cart")}</div>`;
        document.getElementById("cart-total").textContent = money(0);
        return;
      }
      container.innerHTML = `<div class="empty-box mt-4">${t("cart-header")}</div>`;
    }

    function renderWishlist(){
      const container = document.getElementById("wish-content");
      if(!wishlist.length){
        container.innerHTML = `<div class="empty-box mt-4">${t("empty-wish")}</div>`;
        return;
      }
      container.innerHTML = `<div class="empty-box mt-4">${t("wish-header")}</div>`;
    }

    function selectAllCartItems(){}

    function checkoutSelectedCart(){}

    function goOrderPage(){
      if(currentUser){
        window.location.href = "order.html";
      }else{
        sessionStorage.setItem("login_redirect_1885", "order.html");
        window.location.href = "login.html";
      }
    }

    function toggleLang(){
      lang = lang === "ar" ? "en" : "ar";
      localStorage.setItem(LOCAL_KEYS.lang, lang);
      applyLanguageTexts();
      closeAll(false);
    }

    async function loadStoreData(){
      const [storeSnap, bannersSnap, categoriesSnap, productsSnap, sectionsSnap, menuSnap, methodsSnap, socialSnap] = await Promise.all([
        rtdb1885.ref(PATHS.store).get(),
        rtdb1885.ref(PATHS.banners).get(),
        rtdb1885.ref(PATHS.categories).get(),
        rtdb1885.ref(PATHS.products).get(),
        rtdb1885.ref(PATHS.pageSections).get(),
        rtdb1885.ref(PATHS.menuItems).get(),
        rtdb1885.ref(PATHS.paymentMethods).get(),
        rtdb1885.ref(PATHS.socialLinks).get()
      ]);

      const store = storeSnap.val() || {};
      const banners = bannersSnap.val() || {};

      storeSettings = {
        storeName: store.storeName || store.storeNameAr || "متجر طوفان",
        storeNameEn: store.storeNameEn || store.storeName || "Tofan Store",
        storeLogoUrl: store.storeLogoUrl || fallbackLogo,
        bannerTopUrl: banners.topBannerUrl || store.topBannerUrl || ""
      };

      categories = normalizeCategories(categoriesSnap.val() || {});
      products = normalizeProducts(productsSnap.val() || {});
      pageSections = normalizeSections(sectionsSnap.val() || {});
      menuItems = normalizeMenuItems(menuSnap.val() || {});
      paymentMethods = normalizePaymentMethods(methodsSnap.val() || {});
      socialLinks = normalizeSocialLinks(socialSnap.val() || {});
    }

    function attachAuthListener(){
      auth1885.onAuthStateChanged(user => {
        currentUser = user || null;
        renderUserBox();
      });
    }

    async function initPage(){
      try{
        setLoadingBar(true);
        attachAuthListener();
        await loadStoreData();
        updateStoreUI();
        renderSidebarDynamicMenu();
        renderCategoriesSlider();
        renderProductsSections();
        renderDynamicSections();
        renderFooterSection();
        renderUserBox();
        renderCart();
        renderWishlist();
        applyLanguageTexts();
      }catch(err){
        console.error(err);
        document.getElementById("products-sections").innerHTML = `<div class="empty-box">${t("empty-products")}</div>`;
      }finally{
        setLoadingBar(false);
      }
    }

    window.addEventListener("load", initPage);
  </script>
</body>
</html>
