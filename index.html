<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZERO SHOP - Norhan Store</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap');

    *{box-sizing:border-box}
    body{
      font-family:'Cairo',sans-serif;
      background:#f8f9fa;
      user-select:none;
      -webkit-tap-highlight-color:transparent
    }

    .loader{
      border:4px solid #f3f3f3;
      border-top:4px solid #ef4444;
      border-radius:50%;
      width:46px;height:46px;
      animation:spin .8s linear infinite
    }
    @keyframes spin{
      0%{transform:rotate(0)}
      100%{transform:rotate(360deg)}
    }

    .product-card,.cart-item-card,.payment-option{
      transition:all .2s ease;
      border-radius:2rem!important
    }

    .product-card{
      cursor:pointer;
      border:2px solid transparent;
      position:relative;
      background:#fff
    }
    .product-card.selected{
      border-color:#ef4444;
      background:#fffafa
    }
    .product-card:active{transform:scale(.96)}

    .discount-badge{
      position:absolute;
      top:10px;
      right:10px;
      background:#ef4444;
      color:#fff;
      font-size:10px;
      font-weight:800;
      padding:5px 10px;
      border-radius:999px;
      z-index:10;
      display:flex;
      align-items:center;
      gap:4px
    }

    .cart-item-card{
      border:2px solid transparent;
      background:#fff
    }
    .cart-item-card.selected{
      border-color:#ef4444;
      background:#fef2f2
    }

    .info-card{
      border:1px solid #eee;
      border-radius:2rem!important;
      background:#fff;
      overflow:hidden
    }

    .no-scrollbar::-webkit-scrollbar{display:none}

    .toast-notification{animation:slideUp .3s ease-out forwards}
    @keyframes slideUp{
      from{transform:translate(-50%,100%);opacity:0}
      to{transform:translate(-50%,0);opacity:1}
    }

    .modal-overlay{
      background:rgba(0,0,0,.5);
      backdrop-filter:blur(4px)
    }

    .product-img{
      width:100%;
      aspect-ratio:1/1;
      border-radius:1.75rem!important;
      object-fit:cover;
      background:#fff
    }

    .country-icon{
      width:22px;
      height:22px;
      object-fit:cover;
      border-radius:999px;
      background:#fff;
      box-shadow:0 0 0 1px #e5e7eb inset
    }

    .country-select-modern{position:relative}
    .country-select-menu{
      position:absolute;
      top:calc(100% + 8px);
      right:0;
      left:0;
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:1.5rem;
      box-shadow:0 20px 40px rgba(0,0,0,.08);
      padding:10px;
      z-index:80;
      max-height:320px;
      overflow:auto
    }
    .country-option-modern{
      display:flex;
      align-items:center;
      gap:10px;
      width:100%;
      padding:10px 12px;
      border-radius:1rem;
      font-weight:800;
      font-size:13px;
      transition:.2s
    }
    .country-option-modern:hover{background:#f9fafb}
    .country-option-modern.active{
      background:#fef2f2;
      color:#dc2626
    }

    .ad-card{
      background:#fff;
      border:1px solid #eee;
      border-radius:2rem;
      overflow:hidden;
      position:relative;
      box-shadow:0 1px 3px rgba(0,0,0,.05)
    }
    .ad-card.ad-no-border{
      border:none!important;
      box-shadow:none!important;
      background:transparent!important
    }

    .ad-badge{
      position:absolute;
      top:10px;
      left:10px;
      z-index:8;
      background:#111827;
      color:#fff;
      font-size:10px;
      font-weight:800;
      padding:5px 10px;
      border-radius:999px;
      display:flex;
      align-items:center;
      gap:5px
    }

    .ad-slot-1{grid-column:span 1 / span 1}
    .ad-slot-2{grid-column:span 2 / span 2}
    .ad-slot-free{
      grid-column:1 / -1;
      background:transparent!important;
      border:none!important;
      border-radius:0!important;
      box-shadow:none!important;
      overflow:visible!important;
      padding:0!important
    }

    .ad-render-wrap{
      width:100%;
      min-height:170px;
      background:#fff;
      position:relative
    }
    .ad-render-wrap iframe{
      width:100%;
      border:none;
      display:block;
      min-height:170px;
      background:#fff
    }

    .ad-click-cover{
      position:absolute;
      inset:0;
      z-index:5;
      cursor:pointer;
      background:transparent
    }

    .ad-slider-shell,.ad-products-shell,.ad-image-shell{
      position:relative;
      width:100%;
      background:#fff;
      min-height:170px
    }

    .ad-slider-track,.ad-products-track{
      display:flex;
      overflow-x:auto;
      scroll-snap-type:x mandatory;
      scroll-behavior:smooth;
      gap:12px;
      padding:12px
    }
    .ad-slider-track::-webkit-scrollbar,
    .ad-products-track::-webkit-scrollbar{display:none}

    .ad-slide{
      min-width:100%;
      scroll-snap-align:start;
      position:relative;
      border-radius:1.5rem;
      overflow:hidden;
      background:#f8fafc
    }
    .ad-slide img{
      width:100%;
      display:block;
      object-fit:cover;
      max-height:420px
    }

    .ad-products-track .ad-product-item{
      min-width:180px;
      max-width:180px;
      scroll-snap-align:start;
      flex:0 0 180px
    }

    .ad-nav-btn{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      width:36px;
      height:36px;
      border-radius:999px;
      background:rgba(17,24,39,.82);
      color:#fff;
      z-index:7;
      display:flex;
      align-items:center;
      justify-content:center;
      border:none;
      cursor:pointer
    }
    .ad-nav-btn.prev{right:10px}
    .ad-nav-btn.next{left:10px}

    .ad-dots{
      display:flex;
      justify-content:center;
      gap:6px;
      padding:0 12px 12px
    }
    .ad-dot{
      width:8px;
      height:8px;
      border-radius:999px;
      background:#d1d5db;
      transition:.2s;
      border:none
    }
    .ad-dot.active{
      width:20px;
      background:#111827
    }

    .ad-image-only{
      width:100%;
      display:block;
      object-fit:cover;
      max-height:420px
    }

    .middle-render-frame{
      width:100%;
      min-height:180px;
      border:none;
      background:#fff;
      display:block
    }

    .store-title-image{
      max-height:32px;
      object-fit:contain;
      display:block
    }

    .drawer{
      position:fixed;
      top:0;
      bottom:0;
      right:0;
      width:min(88vw,380px);
      background:#fff;
      z-index:10001;
      transform:translateX(110%);
      transition:.25s ease;
      box-shadow:0 20px 50px rgba(0,0,0,.16)
    }
    .drawer.open{transform:translateX(0)}
    .drawer-backdrop{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.42);
      backdrop-filter:blur(2px);
      z-index:10000;
      display:none
    }
    .drawer-backdrop.show{display:block}

    .history-badge{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:6px 12px;
      border-radius:999px;
      font-size:11px;
      font-weight:800
    }

    .verified-blue{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:18px;
      height:18px;
      border-radius:999px;
      background:#dbeafe;
      color:#2563eb;
      font-size:10px
    }

    input,button,select,.rounded-xl,.rounded-2xl,.rounded-3xl{
      border-radius:2rem!important
    }
    textarea{border-radius:1.5rem!important}
    code{direction:ltr;unicode-bidi:bidi-override}

    @media (max-width:640px){
      .ad-slot-2,.ad-slot-free{grid-column:span 2 / span 2}
      .ad-products-track .ad-product-item{
        min-width:160px;
        max-width:160px;
        flex-basis:160px
      }
    }
  </style>

</head>

    function optimizedImageAttrs(){
      return 'loading="lazy" decoding="async" fetchpriority="low" referrerpolicy="no-referrer"';
    }

    function brandImageAttrs(){
      return 'loading="eager" decoding="async" fetchpriority="high" referrerpolicy="no-referrer"';
    }

    function setLoading(on){
      const el = document.getElementById('loadingOverlay');
      if(!el) return;
      on ? el.classList.remove('hidden') : el.classList.add('hidden');
    }

    function withDelay(fn, ms=180){
      setLoading(true);
      setTimeout(() => {
        try{ fn(); }finally{ setLoading(false); }
      }, ms);
    }

    function showToast(msg, type = "success"){
      const t = document.createElement('div');
      const icons = {
        success: '<i class="fa-solid fa-circle-check text-emerald-400 text-lg"></i>',
        error: '<i class="fa-solid fa-circle-xmark text-rose-400 text-lg"></i>',
        info: '<i class="fa-solid fa-circle-info text-sky-400 text-lg"></i>'
      };
      t.className = "toast-notification fixed bottom-24 left-1/2 -translate-x-1/2 bg-[#111827]/95 backdrop-blur-md text-white px-5 py-3 rounded-full z-[10000] text-sm font-bold flex items-center gap-3 shadow-2xl border border-white/10";
      t.innerHTML = `${icons[type] || icons.success}<span>${escapeHtml(msg)}</span>`;
      document.body.appendChild(t);
      setTimeout(() => {
        t.style.opacity = '0';
        t.style.transform = 'translate(-50%,20px)';
        setTimeout(() => t.remove(), 300);
      }, 2500);
    }

    function escapeHtml(str){
      return String(str ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function safeParseJSON(txt, fallback){
      try{return JSON.parse(txt);}catch{return fallback;}
    }

    function normalizeLookup(value){
      return String(value || "").trim().toLowerCase().replace(/^@/, "");
    }

    function toggleSidebar(){
      document.getElementById("sidebarDrawer").classList.add("open");
      document.getElementById("drawerBackdrop").classList.add("show");
    }

    function closeSidebar(){
      document.getElementById("sidebarDrawer").classList.remove("open");
      document.getElementById("drawerBackdrop").classList.remove("show");
    }

    function openCartModal(){
      document.getElementById("cartModal").classList.remove("hidden");
      document.getElementById("cartModal").classList.add("flex");
      renderCartItems();
    }

    function closeCartModal(){
      document.getElementById("cartModal").classList.add("hidden");
      document.getElementById("cartModal").classList.remove("flex");
    }

    function openOrdersModal(){
      document.getElementById("ordersModal").classList.remove("hidden");
      document.getElementById("ordersModal").classList.add("flex");
    }

    function closeOrdersModal(){
      document.getElementById("ordersModal").classList.add("hidden");
      document.getElementById("ordersModal").classList.remove("flex");
    }

    async function sha256(text){
      const data = new TextEncoder().encode(text);
      const hash = await crypto.subtle.digest("SHA-256", data);
      return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,"0")).join("");
    }

    async function ensureAdminSettings(){
      const snap = await rtdb.ref(PATH_SETTINGS_ADMIN).get();
      if(!snap.exists()){
        const defaultHash = await sha256("0000");
        const initial = {
          pinHash: defaultHash,
          mustChange: true,
          email: "homworkhhh76@gmail.com",
          updatedAt: Date.now()
        };
        await rtdb.ref(PATH_SETTINGS_ADMIN).set(initial);
        adminSettingsCache = {...initial};
        return initial;
      }
      const d = snap.val() || {};
      adminSettingsCache = {
        pinHash: d.pinHash || null,
        mustChange: d.mustChange !== false,
        email: d.email || "homworkhhh76@gmail.com"
      };
      return adminSettingsCache;
    }

    function renderStoreBrand(){
      const titleWrap = document.getElementById("storeTitleWrap");
      const logoWrap = document.getElementById("storeLogoWrap");

      if(storeSettings.storeLogoUrl){
        logoWrap.innerHTML = `<img src="${escapeHtml(storeSettings.storeLogoUrl)}" class="w-full h-full object-cover" ${brandImageAttrs()} onerror="this.outerHTML='&lt;i class=&quot;fas fa-store text-red-500&quot;&gt;&lt;/i&gt;'">`;
      }else{
        logoWrap.innerHTML = `<i class="fas fa-store"></i>`;
      }

      if(storeSettings.storeTitleMode === "image" && storeSettings.storeTitleImageUrl){
        titleWrap.innerHTML = `<img src="${escapeHtml(storeSettings.storeTitleImageUrl)}" class="store-title-image" ${brandImageAttrs()} onerror="this.outerHTML='${escapeHtml(storeSettings.storeName || "ZERO SHOP")}'">`;
      }else{
        titleWrap.textContent = storeSettings.storeName || "ZERO SHOP";

      storeSettings = {
        exchangeRate: Number(v.exchangeRate || 3.2),

        storeTitleMode: v.storeTitleMode || "text",
        storeTitleImageUrl: v.storeTitleImageUrl || ""
      };
      exchangeRate = Number(storeSettings.exchangeRate || 3.2);

    function buildCategories(remoteCats){
      categories = Object.entries(remoteCats || {}).map(([id,val]) => ({
        id,
        name: val?.name || id,
        order: Number(val?.order || 0),
        enabled: val?.enabled !== false
      })).sort((a,b) => (a.order || 0) - (b.order || 0));
    }

    function buildCountries(remote){
      countries = Object.entries(remote || {}).map(([code,val]) => ({
        code,
        name: val?.name || code,
        flagUrl: val?.flagUrl || "",
        currencyCode: val?.currencyCode || code,
        currencySymbol: val?.currencySymbol || val?.currencyCode || code,
        rateToIls: Number(val?.rateToIls || 1),
        enabled: val?.enabled !== false,
        order: Number(val?.order || 0)
      })).sort((a,b) => (a.order || 0) - (b.order || 0));
    }

    function buildProducts(remotePro){
      let idx = 0;
      remoteProductsMap = {};
      products = Object.entries(remotePro || {}).map(([key,val]) => {
        remoteProductsMap[key] = val;
        return {
          __type:"remote",
          __key:key,
          __localId:`remote_${key}`,
          category: val?.category || "all",
          name: val?.name || "منتج",
          price: Number(val?.price || 0),
          oldPrice: Number(val?.oldPrice || 0),
          delivery: val?.delivery || "سريع",
          image: val?.image || "https://via.placeholder.com/500?text=No+Image",
          desc: val?.desc || "",
          isDynamic: !!val?.isDynamic,
          enabled: val?.enabled !== false,
          visibleCountries: Array.isArray(val?.visibleCountries) ? val.visibleCountries : [],
          contentBlocks: Array.isArray(val?.contentBlocks) ? val.contentBlocks : [],
          middleMode: val?.middleMode || "json",
          middleJson: Array.isArray(val?.middleJson) ? val.middleJson : [],
          middleWebCode: val?.middleWebCode || "",
          _sortIndex: idx++
        };
      });
    }

    function buildCommunityPosts(remote){
      communityPosts = Object.entries(remote || {}).map(([key,val], idx) => ({
        __type:"community",
        __key:key,
        __localId:`community_${key}`,
        category: val?.categoryId || "all",
        name: val?.title || "منشور",
        price: Number(val?.price || 0),
        oldPrice: 0,
        delivery: "",
        image: (val?.images || [])[0] || "https://via.placeholder.com/500?text=Post",
        images: Array.isArray(val?.images) ? val.images : [],
        desc: val?.desc || "",
        isDynamic: false,
        enabled: val?.approvalStatus === "approved",
        visibleCountries: val?.countryCode && val.countryCode !== "GLOBAL" ? [val.countryCode] : [],
        detailsMode: val?.detailsMode || "whatsapp",
        whatsappPrefix: val?.whatsappPrefix || "972",
        whatsappNumber: val?.whatsappNumber || "",
        displayName: val?.displayName || "مستخدم",
        userHandle: val?.userHandle || "",
        verified: !!val?.verifiedSnapshot,
        _sortIndex: idx
      })).filter(x => x.enabled);
    }

    function normalizeAdClickAction(v){
      if(!v || typeof v !== "object") return {type:"none", link:"", categoryId:"", productKey:""};
      return {
        type: v.type || "none",
        link: v.link || "",
        categoryId: v.categoryId || "",
        productKey: v.productKey || ""
      };
    }

    function normalizeAdSlides(v){
      if(!Array.isArray(v)) return [];
      return v.map(item => ({
        id: item.id || ("slide_" + Math.random()),
        src: item.src || "",
        clickAction: normalizeAdClickAction(item.clickAction)
      })).filter(x => x.src);
    }

    function normalizeMiddleJson(v){
      const arr = Array.isArray(v) ? v : [];
      return arr.map(item => {
        const type = item.type || "text";
        if(type === "note") return {type:"note", style:item.style || "info", text:item.text || ""};
        if(type === "image") return {type:"image", src:item.src || "", caption:item.caption || ""};
        if(type === "button") return {type:"button", label:item.label || "زر", actionType:item.actionType || "toast", url:item.url || "", message:item.message || "", toastType:item.toastType || "success"};
        if(type === "html") return {type:"html", html:item.html || ""};
        if(type === "card") return {type:"card", title:item.title || "", text:item.text || ""};
        return {type:"text", title:item.title || "", text:item.text || ""};
      });
    }

    function buildAds(remote){
      remoteAdsMap = remote || {};
      ads = Object.entries(remote || {}).map(([key,val]) => ({
        __key:key,
        name: val?.name || "إعلان",
        type: val?.type || "web",
        code: val?.code || "",
        json: normalizeMiddleJson(val?.json || []),
        image: val?.image || "",
        slides: normalizeAdSlides(val?.slides || []),
        productKey: val?.productKey || "",
        productKeys: Array.isArray(val?.productKeys) ? val.productKeys : [],
        span: val?.span || "1",
        position: Number(val?.position || 1),
        enabled: val?.enabled !== false,
        clickAction: normalizeAdClickAction(val?.clickAction),
        display: {
          showBadge: val?.display?.showBadge !== false,
          showBorder: val?.display?.showBorder !== false
        },
        visibility: {
          categoryMode: val?.visibility?.categoryMode || "all",
          categories: Array.isArray(val?.visibility?.categories) ? val.visibility.categories : []
        }
      })).filter(ad => ad.enabled).sort((a,b) => (a.position || 0) - (b.position || 0));
    }

    function sanitizeCart(){
      const allMap = new Map([...products, ...communityPosts].map(p => [String(p.__localId), p]));
      cart = (cart || []).filter(item => allMap.has(String(item.__localId))).map(item => {
        const live = allMap.get(String(item.__localId));
        return {
          ...item,
          __type: live.__type,
          __key: live.__key,
          image: live.image,
          name: live.name,
          category: live.category,
          price: Number(live.price || item.price || 0),
          quantity: Math.max(1, Number(item.quantity || 1))
        };
      });
      localStorage.setItem('norhan_cart', JSON.stringify(cart));
    }

    function getSelectedCountry(){
      if(selectedCountryCode === "GLOBAL") return {...GLOBAL_COUNTRY, rateToIls: exchangeRate};
      return countries.find(c => c.code === selectedCountryCode && c.enabled !== false) || {...GLOBAL_COUNTRY, rateToIls: exchangeRate};
    }

    function moneySymbolPosition(symbol){
      if(["₪","د.أ","د.إ","ر.س"].includes(symbol)) return "after";
      return "before";
    }

    function convertIlsToSelectedCurrency(ilsAmount){
      const country = getSelectedCountry();
      const rate = Number(country.rateToIls || 1);
      if(rate <= 0) return Number(ilsAmount || 0);
      return Number(ilsAmount || 0) / rate;
    }

    function formatDisplayPrice(ilsAmount){
      const country = getSelectedCountry();
      const localValue = convertIlsToSelectedCurrency(ilsAmount);
      const symbol = country.currencySymbol || country.currencyCode || "₪";
      if(moneySymbolPosition(symbol) === "after"){
        return `${localValue.toFixed(2)} ${symbol}`;
      }
      return `${symbol}${localValue.toFixed(2)}`;
    }

    function calculateDiscountPercent(price, oldPrice){
      const p = Number(price || 0);
      const o = Number(oldPrice || 0);
      if(!(o > p && o > 0)) return null;
      return Math.round(((o - p) / o) * 100);
    }

    function getProductPricing(product){
      const basePrice = Number(product?.price || 0);
      const manualOldPrice = Number(product?.oldPrice || 0);
      if(manualOldPrice > basePrice && basePrice > 0){
        return {
          finalPrice: basePrice,
          oldPrice: manualOldPrice,
          percent: calculateDiscountPercent(basePrice, manualOldPrice)
        };
      }
      return {
        finalPrice: basePrice,
        oldPrice: 0,
        percent: 0
      };
    }

    function getProductUnitPrice(product){
      return Number(getProductPricing(product).finalPrice || 0);
    }

    function getProductOldPrice(product){
      return Number(getProductPricing(product).oldPrice || 0);
    }

    function getProductDiscountBadge(product){
      const info = getProductPricing(product);
      return info.percent > 0 ? info.percent : null;
    }

    function updateActionButtonState(){
      const btnText = document.getElementById('actionBtnText');
      if(btnText) btnText.textContent = "اشتري الآن";
    }

    function detectAndApplyCountry(){
      const currentExists = selectedCountryCode === "GLOBAL" || countries.find(c => c.code === selectedCountryCode && c.enabled !== false);
      if(currentExists){
        applyCountry(selectedCountryCode, false);
        return;
      }
      applyCountry("GLOBAL", false);
    }

    function applyCountry(code, rerender = true){
      if(code !== "GLOBAL"){
        const exists = countries.find(c => c.code === code && c.enabled !== false);
        if(!exists) code = "GLOBAL";
      }
      selectedCountryCode = code;
      localStorage.setItem(COUNTRY_STORAGE_KEY, code);

      updateHeaderCountryUI();
      renderCountryDropdown();

      if(rerender){
        sanitizeCart();
        renderCategoriesBar();
        renderProducts();
        renderCartItems();
        updateFooterDisplay();
      }
    }

    function updateHeaderCountryUI(){
      const wrap = document.getElementById("headerCountryIconWrap");
      const label = document.getElementById("selectedCountryLabel");
      const country = getSelectedCountry();

      if(country.code === "GLOBAL"){
        wrap.innerHTML = `<i class="fas fa-globe text-gray-700"></i>`;
      }else{
        wrap.innerHTML = `<img src="${escapeHtml(country.flagUrl)}" class="country-icon" ${optimizedImageAttrs()} onerror="this.outerHTML='&lt;i class=&quot;fas fa-globe text-gray-700&quot;&gt;&lt;/i&gt;'">`;
      }
      label.textContent = `الدولة: ${country.name}`;
    }

    function toggleCountryDropdown(){
      document.getElementById("countryDropdownMenu").classList.toggle("hidden");
    }

    function renderCountryDropdown(){
      const menu = document.getElementById("countryDropdownMenu");
      const selectedWrap = document.getElementById("countryDropdownSelected");
      const enabledCountries = countries.filter(c => c.enabled !== false);
      const current = getSelectedCountry();

      selectedWrap.innerHTML = current.code === "GLOBAL"
        ? `<i class="fas fa-globe text-gray-600"></i><span>عالمي</span>`
        : `<img src="${escapeHtml(current.flagUrl)}" class="country-icon" ${optimizedImageAttrs()} onerror="this.style.display='none'"><span>${escapeHtml(current.name)}</span>`;

      menu.innerHTML = `
        <button class="country-option-modern ${selectedCountryCode === 'GLOBAL' ? 'active' : ''}" onclick="selectCountryFromDropdown('GLOBAL')">

          <span>عالمي</span>
        </button>
        ${enabledCountries.map(c => `
          <button class="country-option-modern ${selectedCountryCode === c.code ? 'active' : ''}" onclick="selectCountryFromDropdown('${c.code}')">
            <img src="${escapeHtml(c.flagUrl)}" class="country-icon" ${optimizedImageAttrs()} onerror="this.style.display='none'">
            <span>${escapeHtml(c.name)}</span>

    function selectCountryFromDropdown(code){
      applyCountry(code);
      document.getElementById("countryDropdownMenu").classList.add("hidden");
    }

    document.addEventListener("click", (e) => {
      const box = document.querySelector(".country-select-modern");

        if(menu) menu.classList.add("hidden");
      }
    });

    function productVisibleInCurrentCountry(product){
      if(product.enabled === false) return false;
      if(selectedCountryCode === "GLOBAL") return true;
      if(!Array.isArray(product.visibleCountries) || !product.visibleCountries.length) return true;
      return product.visibleCountries.includes(selectedCountryCode) || product.visibleCountries.includes("ALL");
    }

    function getVisibleProducts(){
      return [...products, ...communityPosts].filter(productVisibleInCurrentCountry);
    }

    function adVisibleInCurrentCategory(ad){
      const visibility = ad.visibility || {categoryMode:"all",categories:[]};
      if(visibility.categoryMode === "all") return true;
      if(visibility.categoryMode === "all_only") return currentActiveCategory === "all";
      if(visibility.categoryMode === "selected"){
        return visibility.categories.includes(currentActiveCategory);
      }
      return true;
    }

    function renderCategoriesBar(){
      const bar = document.getElementById('categoriesBar');
      const visibleProducts = getVisibleProducts();
      const usedCategories = new Set(visibleProducts.map(p => p.category));
      const enabled = categories.filter(c => c.enabled !== false && usedCategories.has(c.id)).sort((a,b) => (a.order || 0) - (b.order || 0));

      if(currentActiveCategory !== "all" && !enabled.find(c => c.id === currentActiveCategory)){
        currentActiveCategory = 'all';
      }

      bar.innerHTML = `
        <button id="cat-all" onclick="filterCategory('all')" class="${currentActiveCategory === 'all' ? 'bg-red-500 text-white' : 'bg-gray-100 text-gray-600'} px-5 py-1.5 rounded-full whitespace-nowrap transition-colors">الكل</button>
        ${enabled.map(c => `
          <button id="cat-${c.id}" onclick="filterCategory('${c.id}')" class="${c.id === currentActiveCategory ? 'bg-red-500 text-white' : 'bg-gray-100 text-gray-600'} px-5 py-1.5 rounded-full whitespace-nowrap transition-colors">${escapeHtml(c.name)}</button>
        `).join('')}
      `;
    }

    function filterCategory(cat){
      withDelay(() => {
        currentActiveCategory = cat;
        renderCategoriesBar();
        renderProducts();
      }, 120);
    }

    function handleSearch(){
      renderProducts();
    }

    function shuffleArray(list){
      const arr = [...list];
      for(let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function mergeProductsWithAds(productList){
      const out = [];
      let pIndex = 0;
      const visibleAds = ads.filter(ad => adVisibleInCurrentCategory(ad));

      while(pIndex < productList.length){
        const nextPos = pIndex + 1;
        const adsHere = visibleAds.filter(ad => Number(ad.position || 1) === nextPos);
        adsHere.forEach(ad => out.push({__kind:"ad", ...ad}));
        out.push({__kind:"product", ...productList[pIndex]});
        pIndex++;
      }

      const trailingAds = visibleAds.filter(ad => Number(ad.position || 1) > productList.length);
      trailingAds.forEach(ad => out.push({__kind:"ad", ...ad}));
      return out;
    }

    function resetProductsPagination(){
      renderedProductsCount = 0;
      currentRenderedProductList = [];
      if(productsObserver){
        productsObserver.disconnect();
        productsObserver = null;
      }
    }

    function observeProductsLoadMore(){
      const sentinel = document.getElementById("productsLoadSentinel");
      if(!sentinel) return;

      if(productsObserver) productsObserver.disconnect();

      productsObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if(entry.isIntersecting) loadMoreProducts();
        });
      }, {threshold:.2});

      productsObserver.observe(sentinel);
    }

    function loadMoreProducts(){
      const all = currentRenderedProductList;
      if(renderedProductsCount >= all.length) return;
      renderedProductsCount += productsPerPage;
      renderProductsChunk();
    }

    function getAdSpanClass(span){
      if(String(span) === "2") return "ad-slot-2";
      if(String(span) === "free") return "ad-slot-free";
      return "ad-slot-1";
    }

    function getAdCardClasses(ad){
      return `ad-card ${getAdSpanClass(ad.span)} ${(ad.display?.showBorder === false) ? 'ad-no-border' : ''}`.trim();
    }

    function renderAdBadge(ad){
      if(ad.display?.showBadge === false) return "";
      return `<div class="ad-badge"><i class="fas fa-bullhorn"></i> ممول</div>`;
    }

    function getProductByRemoteKey(key){
      return products.find(p => p.__key === key) || null;
    }

    function openBuyForLocalId(localId){
      const product = [...products, ...communityPosts].find(p => String(p.__localId) === String(localId));
      if(!product) return;
      selectedProductId = product.__localId;
      applySelectedProductClasses();
      updateFooterDisplay();
      startCheckoutForSelected();
    }

    function runClickAction(action){
      if(!action) return;
      if(action.type === "link" && action.link){
        window.location.href = action.link;
        return;
      }
      if(action.type === "category" && action.categoryId){
        withDelay(() => {
          currentActiveCategory = action.categoryId;
          renderCategoriesBar();
          renderProducts();
          window.scrollTo({top:0, behavior:"smooth"});
        }, 120);
        return;
      }
      if(action.type === "product" && action.productKey){
        const product = getProductByRemoteKey(action.productKey);
        if(product) openBuyForLocalId(product.__localId);
      }
    }

    function handleAdClick(ad){
      if(!ad) return;

      if(ad.type === "product" && ad.productKey){
        const product = getProductByRemoteKey(ad.productKey);
        if(product){
          openBuyForLocalId(product.__localId);
          return;
        }
      }

      const action = normalizeAdClickAction(ad.clickAction);
      runClickAction(action);
    }

    function renderAdProductCard(product, compact=false){
      if(!product) return `<div class="p-4 text-center text-gray-400 font-bold">المنتج غير موجود</div>`;
      const disc = getProductDiscountBadge(product);
      const priceInfo = getProductPricing(product);
      return `
        <div onclick="openBuyForLocalId('${product.__localId}')" class="${compact ? 'ad-product-item' : 'p-3'} cursor-pointer">
          <div class="bg-white p-3 rounded-[2rem] border border-gray-100 relative h-full">
            ${disc ? `<div class="discount-badge"><i class="fas fa-percent"></i> -${disc}%</div>` : ''}
            <img src="${escapeHtml(product.image)}" class="w-full product-img mb-2 p-1" ${optimizedImageAttrs()} onerror="this.src='https://via.placeholder.com/500?text=No+Image'">
            <h3 class="font-bold text-sm mb-1 truncate text-gray-800">${escapeHtml(product.name)}</h3>
            <div class="flex items-center gap-2">
              <span class="text-red-500 font-bold text-sm">${formatDisplayPrice(priceInfo.finalPrice)}</span>
              ${priceInfo.oldPrice > 0 ? `<span class="text-gray-400 line-through text-[10px]">${formatDisplayPrice(priceInfo.oldPrice)}</span>` : ''}
            </div>
          </div>
        </div>
      `;
    }

    function scrollAdTrack(id, dir=1){
      const track = document.getElementById(id);
      if(!track) return;
      const amount = track.clientWidth * 0.9;
      track.scrollBy({left: dir * amount, behavior:'smooth'});
    }

    function syncAdDots(trackId, dotsId){
      const track = document.getElementById(trackId);
      const dots = document.getElementById(dotsId);
      if(!track || !dots) return;
      const children = [...dots.querySelectorAll('.ad-dot')];
      const index = Math.round(track.scrollLeft / Math.max(track.clientWidth, 1));
      children.forEach((dot,i) => dot.classList.toggle('active', i === index));
    }

    function goToAdSlide(trackId, dotsId, index){
      const track = document.getElementById(trackId);
      if(!track) return;
      track.scrollTo({left: track.clientWidth * index, behavior:'smooth'});
      setTimeout(() => syncAdDots(trackId, dotsId), 180);
    }

    function setupAutoIframeSize(){
      const frames = document.querySelectorAll('iframe[data-auto-resize="1"]');
      frames.forEach(frame => {
        const resize = () => {
          try{
            const doc = frame.contentDocument || frame.contentWindow.document;
            if(!doc) return;
            const body = doc.body;
            const html = doc.documentElement;
            const h = Math.max(
              body ? body.scrollHeight : 0,
              body ? body.offsetHeight : 0,
              html ? html.scrollHeight : 0,
              html ? html.offsetHeight : 0,
              html ? html.clientHeight : 0
            );
            if(h > 0){
              frame.style.height = h + 'px';
              frame.style.minHeight = h + 'px';
            }
          }catch(err){}
        };
        frame.onload = () => {
          resize();
          setTimeout(resize, 100);
          setTimeout(resize, 300);
          setTimeout(resize, 800);
        };
      });
    }

    function handleSlideClick(adKey, index){
      const ad = ads.find(a => a.__key === adKey);
      if(!ad) return;
      const slide = (ad.slides || [])[index];
      if(slide && slide.clickAction && slide.clickAction.type !== "none"){
        runClickAction(slide.clickAction);
        return;
      }
      handleAdClick(ad);
    }

    function renderMiddleJsonBlocks(list){
      const arr = normalizeMiddleJson(list || []);
      if(!arr.length) return "";
      return arr.map(item => {
        if(item.type === "note"){
          const styleMap = {
            info: "bg-blue-50 border-blue-200 text-blue-700",
            success: "bg-green-50 border-green-200 text-green-700",
            error: "bg-red-50 border-red-200 text-red-700",
            warning: "bg-amber-50 border-amber-200 text-amber-700"
          };
          const cls = styleMap[item.style] || styleMap.info;
          return `<div class="border rounded-[1.5rem] p-4 text-sm font-bold ${cls}">${escapeHtml(item.text)}</div>`;
        }
        if(item.type === "image"){
          return `
            <div class="bg-white border border-gray-200 rounded-[1.5rem] p-3 overflow-hidden">
              <img src="${escapeHtml(item.src || 'https://via.placeholder.com/600?text=Image')}" class="w-full rounded-[1.25rem] object-cover" ${optimizedImageAttrs()} onerror="this.src='https://via.placeholder.com/600?text=Image'">
              ${item.caption ? `<div class="text-xs text-gray-500 font-bold text-center mt-2">${escapeHtml(item.caption)}</div>` : ''}
            </div>
          `;
        }
        if(item.type === "card" || item.type === "text"){
          return `
            <div class="bg-white border border-gray-200 rounded-[1.5rem] p-4">
              ${item.title ? `<div class="font-bold text-sm mb-1 text-gray-800">${escapeHtml(item.title)}</div>` : ''}
              <div class="text-sm text-gray-600 whitespace-pre-line">${escapeHtml(item.text || "")}</div>
            </div>
          `;
        }
        if(item.type === "html"){
          return `
            <div class="bg-white border border-gray-200 rounded-[1.5rem] overflow-hidden">
              <iframe data-auto-resize="1" sandbox="allow-scripts allow-popups allow-forms" srcdoc="${escapeHtml(item.html || '')}" class="middle-render-frame"></iframe>
            </div>
          `;
        }
        return '';
      }).join('');
    }

    function renderAdImagesSlider(ad){
      const slides = normalizeAdSlides(ad.slides || []);
      if(!slides.length) return `<div class="p-4 text-center text-gray-400 font-bold">لا توجد صور</div>`;
      const trackId = `ad_track_${ad.__key}`;
      const dotsId = `ad_dots_${ad.__key}`;
      return `
        <div class="ad-image-shell relative">
          ${slides.length > 1 ? `<button class="ad-nav-btn prev" onclick="event.stopPropagation();scrollAdTrack('${trackId}',-1)"><i class="fas fa-chevron-right"></i></button>` : ''}
          ${slides.length > 1 ? `<button class="ad-nav-btn next" onclick="event.stopPropagation();scrollAdTrack('${trackId}',1)"><i class="fas fa-chevron-left"></i></button>` : ''}
          <div id="${trackId}" class="ad-slider-track" onscroll="syncAdDots('${trackId}','${dotsId}')">
            ${slides.map((slide, i) => `
              <div class="ad-slide">
                <img src="${escapeHtml(slide.src)}" ${optimizedImageAttrs()} onerror="this.src='https://via.placeholder.com/900x400?text=Ad'">
                <div class="ad-click-cover" onclick="handleSlideClick('${ad.__key}',${i})"></div>
              </div>
            `).join('')}
          </div>
          ${slides.length > 1 ? `<div id="${dotsId}" class="ad-dots">${slides.map((_,i) => `<button class="ad-dot ${i===0?'active':''}" onclick="event.stopPropagation();goToAdSlide('${trackId}','${dotsId}',${i})"></button>`).join('')}</div>` : ''}
        </div>
      `;
    }

    function renderAdProductsSlider(ad){
      const keys = Array.isArray(ad.productKeys) ? ad.productKeys : [];
      const list = keys.map(getProductByRemoteKey).filter(Boolean);
      if(!list.length) return `<div class="p-4 text-center text-gray-400 font-bold">لا توجد منتجات محددة</div>`;
      const trackId = `ad_products_${ad.__key}`;
      return `
        <div class="ad-products-shell relative">
          ${list.length > 1 ? `<button class="ad-nav-btn prev" onclick="event.stopPropagation();scrollAdTrack('${trackId}',-1)"><i class="fas fa-chevron-right"></i></button>` : ''}
          ${list.length > 1 ? `<button class="ad-nav-btn next" onclick="event.stopPropagation();scrollAdTrack('${trackId}',1)"><i class="fas fa-chevron-left"></i></button>` : ''}
          <div id="${trackId}" class="ad-products-track">
            ${list.map(product => renderAdProductCard(product, true)).join('')}
          </div>
        </div>
      `;
    }

    function handleAdClickByKey(key){
      const ad = ads.find(a => a.__key === key);
      handleAdClick(ad);
    }

    function renderAdCard(ad){
      const hasClick = ad.type === "product" || normalizeAdClickAction(ad.clickAction).type !== "none";
      const cardClasses = getAdCardClasses(ad);

      if(ad.type === "product"){
        const product = getProductByRemoteKey(ad.productKey);
        return `
          <div class="${cardClasses}">
            ${renderAdBadge(ad)}
            ${renderAdProductCard(product)}
          </div>
        `;
      }

      if(ad.type === "products_slider"){
        return `
          <div class="${cardClasses}">
            ${renderAdBadge(ad)}
            ${renderAdProductsSlider(ad)}
          </div>
        `;
      }

      if(ad.type === "image"){
        return `
          <div class="${cardClasses}">
            ${renderAdBadge(ad)}
            <div class="ad-image-shell relative">
              <img src="${escapeHtml(ad.image || 'https://via.placeholder.com/800x400?text=Ad')}" class="ad-image-only" ${optimizedImageAttrs()} onerror="this.src='https://via.placeholder.com/800x400?text=Ad'">
              ${hasClick ? `<div class="ad-click-cover" onclick="handleAdClickByKey('${ad.__key}')"></div>` : ''}
            </div>
          </div>
        `;
      }

      if(ad.type === "images_slider"){
        return `
          <div class="${cardClasses}">
            ${renderAdBadge(ad)}
            ${renderAdImagesSlider(ad)}
          </div>
        `;
      }

      if(ad.type === "json"){
        return `
          <div class="${cardClasses}">
            ${renderAdBadge(ad)}
            <div class="p-3 relative">
              ${renderMiddleJsonBlocks(ad.json)}
              ${hasClick ? `<div class="ad-click-cover" onclick="handleAdClickByKey('${ad.__key}')"></div>` : ''}
            </div>
          </div>
        `;
      }

      return `
        <div class="${cardClasses}">
          ${renderAdBadge(ad)}
          <div class="ad-render-wrap">
            <iframe data-auto-resize="1" sandbox="allow-scripts allow-forms allow-popups allow-popups-to-escape-sandbox"
              srcdoc="${escapeHtml(String(ad.code || ''))}"
              style="min-height:170px;height:auto;background:#fff"></iframe>
            ${hasClick ? `<div class="ad-click-cover" onclick="handleAdClickByKey('${ad.__key}')"></div>` : ''}
          </div>
        </div>
      `;
    }

    function renderProductsChunk(){
      const grid = document.getElementById('productsGrid');
      const merged = mergeProductsWithAds(currentRenderedProductList);

      let productsSeen = 0;
      const visibleChunk = [];
      for(const item of merged){
        if(item.__kind === "product"){
          if(productsSeen < renderedProductsCount){
            visibleChunk.push(item);
            productsSeen++;
          }else{
            break;
          }
        }else{
          if(productsSeen <= renderedProductsCount){
            visibleChunk.push(item);
          }
        }
      }

      if(!currentRenderedProductList.length){
        grid.innerHTML = `
          <div class="col-span-2 bg-white rounded-[2rem] p-8 text-center text-gray-400 font-bold shadow-sm">
            لا توجد منتجات متاحة في هذه الدولة حالياً
          </div>
        `;
        return;
      }

      grid.innerHTML = visibleChunk.map(item => {
        if(item.__kind === "ad") return renderAdCard(item);

        const p = item;
        const disc = getProductDiscountBadge(p);
        const pricing = getProductPricing(p);

        return `
          <div data-product-id="${escapeHtml(String(p.__localId))}" onclick="selectProduct('${escapeHtml(String(p.__localId))}')" class="product-card bg-white p-3 shadow-sm ${String(selectedProductId) === String(p.__localId) ? 'selected' : ''}">
            ${disc ? `<div class="discount-badge"><i class="fas fa-percent"></i> -${disc}%</div>` : ''}
            <img src="${escapeHtml(p.image)}" class="w-full product-img mb-2 p-1" ${optimizedImageAttrs()} onerror="this.src='https://via.placeholder.com/500?text=No+Image'">
            <h3 class="font-bold text-xs mb-1 truncate text-gray-800">${escapeHtml(p.name)}</h3>
            <div class="flex flex-col gap-1">
              <div class="flex items-center gap-2">
                <span class="text-red-500 font-bold text-sm">${formatDisplayPrice(pricing.finalPrice)}</span>
                ${pricing.oldPrice > 0 ? `<span class="text-gray-400 line-through text-[10px]">${formatDisplayPrice(pricing.oldPrice)}</span>` : ''}
              </div>
              <div class="flex justify-end">
                <div onclick="quickAdd(event, '${escapeHtml(String(p.__localId))}')" class="w-8 h-8 bg-red-50 text-red-500 rounded-full flex items-center justify-center text-xs active:scale-90 transition-transform shadow-sm">
                  <i class="fas fa-plus"></i>
                </div>
              </div>
            </div>
          </div>
        `;
      }).join('') + `<div id="productsLoadSentinel" class="col-span-2 h-10"></div>`;

      setupAutoIframeSize();

      if(renderedProductsCount < currentRenderedProductList.length){
        observeProductsLoadMore();
      }
    }

    function renderProducts(){
      const term = (document.getElementById('searchInput').value || "").toLowerCase().trim();
      let list = getVisibleProducts();

      if(currentActiveCategory !== "all") list = list.filter(p => p.category === currentActiveCategory);
      if(term) list = list.filter(p => (p.name || "").toLowerCase().includes(term));
      list = shuffleArray(list);

      resetProductsPagination();
      currentRenderedProductList = list;
      renderedProductsCount = Math.min(productsPerPage, list.length);
      renderProductsChunk();

      if(!selectedProductId && list.length) selectedProductId = list[0].__localId;
      applySelectedProductClasses();
      updateFooterDisplay();
    }

    function applySelectedProductClasses(){
      document.querySelectorAll("[data-product-id]").forEach(el => {
        el.classList.toggle("selected", String(el.getAttribute("data-product-id")) === String(selectedProductId));
      });
    }

    function selectProduct(id){
      selectedProductId = id;
      applySelectedProductClasses();
      updateFooterDisplay();
    }

    function findProductByLocalId(localId){
      return [...products, ...communityPosts].find(p => String(p.__localId) === String(localId)) || null;
    }

    function saveCart(){
      localStorage.setItem('norhan_cart', JSON.stringify(cart));
    }

    function getCartItemUnitPrice(item){
      const live = findProductByLocalId(item.__localId);
      if(live) return Number(live.price || 0);
      return Number(item?.price || 0);
    }

    function updateCartUI(){
      const count = cart.reduce((sum,i) => sum + Number(i.quantity || 0), 0);
      document.getElementById('cartCountBadge').innerText = count;
      renderCartItems();
    }

    function quickAdd(event, localId){
      event.stopPropagation();
      const product = findProductByLocalId(localId);
      if(!product || !productVisibleInCurrentCountry(product)) return;

      const unitPrice = getProductUnitPrice(product);
      const existing = cart.find(i => String(i.__localId) === String(localId));

      if(existing){
        existing.quantity += 1;
        existing.price = unitPrice;
      }else{
        cart.push({
          __localId: product.__localId,
          __type: product.__type,
          __key: product.__key,
          name: product.name,
          image: product.image,
          category: product.category,
          price: unitPrice,
          quantity: 1
        });
      }

      saveCart();
      updateCartUI();
      showToast(`تم إضافة ${product.name} للسلة`,"success");
    }

    function renderCartItems(){
      const list = document.getElementById('cartItemsList');
      const visibleCart = cart.filter(i => {
        const live = findProductByLocalId(i.__localId);
        return !!live && productVisibleInCurrentCountry(live);
      });

      if(visibleCart.length === 0){
        document.getElementById('emptyCartMsg').classList.remove('hidden');
        list.innerHTML = "";
        updateFooterDisplay();
        return;
      }

      document.getElementById('emptyCartMsg').classList.add('hidden');
      list.innerHTML = visibleCart.map(item => {
        const live = findProductByLocalId(item.__localId);
        const unitPrice = getCartItemUnitPrice(item);
        const totalPrice = unitPrice * Number(item.quantity || 1);
        const oldP = live ? getProductOldPrice(live) : 0;
        return `
          <div onclick="selectCartProduct('${escapeHtml(String(item.__localId))}')" class="cart-item-card p-4 flex items-center gap-4 shadow-sm ${String(selectedProductId)===String(item.__localId) ? 'selected' : ''}">
            <img src="${escapeHtml(item.image)}" class="w-16 h-16 object-cover bg-gray-50 p-1 border rounded-[1.25rem]" ${optimizedImageAttrs()} onerror="this.src='https://via.placeholder.com/120?text=No+Image'">
            <div class="flex-grow">
              <h4 class="font-bold text-sm">${escapeHtml(item.name)}</h4>
              <div class="flex items-center justify-between mt-2">
                <div class="flex items-center gap-2">
                  <span class="text-red-500 font-bold">${formatDisplayPrice(totalPrice)}</span>
                  ${oldP > 0 ? `<span class="text-gray-400 line-through text-[10px]">${formatDisplayPrice(oldP * Number(item.quantity || 1))}</span>` : ''}
                </div>
                <div class="flex items-center gap-3" onclick="event.stopPropagation()">
                  <button onclick="changeQty('${escapeHtml(String(item.__localId))}', -1)" class="w-7 h-7 bg-gray-100 rounded-full flex items-center justify-center font-bold text-gray-600">-</button>
                  <span class="font-bold text-sm">${item.quantity}</span>
                  <button onclick="changeQty('${escapeHtml(String(item.__localId))}', 1)" class="w-7 h-7 bg-gray-100 rounded-full flex items-center justify-center font-bold text-gray-600">+</button>
                </div>
              </div>
            </div>
          </div>
        `;
      }).join('');

      updateFooterDisplay();
    }

    function changeQty(localId, delta){
      const item = cart.find(i => String(i.__localId) === String(localId));
      if(item){
        item.quantity += delta;
        if(item.quantity <= 0){
          cart = cart.filter(i => String(i.__localId) !== String(localId));
          if(String(selectedProductId) === String(localId) && cart.length > 0) selectedProductId = cart[0].__localId;
        }
        saveCart();
        updateCartUI();
        applySelectedProductClasses();
      }
    }

    function selectCartProduct(localId){
      selectedProductId = localId;
      renderCartItems();
      applySelectedProductClasses();
      updateFooterDisplay();
    }

    function checkoutSelectedFromCart(){
      closeCartModal();
      startCheckoutForSelected();
    }

    function updateFooterDisplay(){
      const footerTotal = document.getElementById('footerTotalPrice');
      const product = findProductByLocalId(selectedProductId);

      if(!product){
        footerTotal.innerText = "0.00 ₪";
        updateActionButtonState();
        return;
      }

      const item = cart.find(i => String(i.__localId) === String(selectedProductId));
      if(item) footerTotal.innerText = formatDisplayPrice(getCartItemUnitPrice(item) * Number(item.quantity || 1));
      else footerTotal.innerText = getProductUnitPrice(product) > 0 ? formatDisplayPrice(getProductUnitPrice(product)) : "اختر المبلغ";

      updateActionButtonState();
    }

    function persistCheckoutSelection(product){
      sessionStorage.removeItem("checkoutFieldsCache");
      sessionStorage.setItem(CHECKOUT_SELECTION_KEY, JSON.stringify({
        selectedProductId: product.__localId,
        selectedCountryCode: selectedCountryCode
      }));
    }

    function startCheckoutForSelected(){
      const product = findProductByLocalId(selectedProductId);
      if(!product){
        showToast("اختر منتجاً أولاً","error");
        return;
      }
      persistCheckoutSelection(product);
      withDelay(() => {
        window.location.href = "pay.html";
      }, 220);
    }

    function handlePrimaryAction(){
      startCheckoutForSelected();
    }

    function updateSidebarUI(){
      const accountText = document.getElementById("sidebarAccountText");
      const userSub = document.getElementById("sidebarUserSub");
      const logoutBtn = document.getElementById("sidebarLogoutBtn");
      const adminSession = safeParseJSON(sessionStorage.getItem(ADMIN_SESSION_KEY) || "null", null);
      const isAdminSession = !!(adminSession && adminSession.expiresAt && Date.now() < adminSession.expiresAt);

      if(isAdminSession){
        accountText.textContent = "الأدمن";
        userSub.textContent = adminSettingsCache.email || "أدمن";
        logoutBtn.classList.remove("hidden");
        return;
      }

      if(currentUser){
        accountText.textContent = "الملف الشخصي";
        userSub.textContent = currentUser.email || "مستخدم";
        logoutBtn.classList.remove("hidden");
      }else{
        accountText.textContent = "تسجيل الدخول أو إنشاء حساب";
        userSub.textContent = "مرحباً بك";
        logoutBtn.classList.add("hidden");
      }
    }

    function openAccountDestination(){
      closeSidebar();
      const adminSession = safeParseJSON(sessionStorage.getItem(ADMIN_SESSION_KEY) || "null", null);
      const isAdminSession = !!(adminSession && adminSession.expiresAt && Date.now() < adminSession.expiresAt);

      withDelay(() => {
        if(isAdminSession){
          window.location.href = "admin.html";
        }else{
          window.location.href = "login.html";
        }
      }, 120);
    }

    function openPublishDestination(){
      closeSidebar();
      withDelay(() => {
        window.location.href = "login.html?tab=newpost";
      }, 120);
    }

    async function logoutCurrentUser(){
      closeSidebar();
      const adminSession = safeParseJSON(sessionStorage.getItem(ADMIN_SESSION_KEY) || "null", null);
      const isAdminSession = !!(adminSession && adminSession.expiresAt && Date.now() < adminSession.expiresAt);

      setLoading(true);
      try{
        if(isAdminSession){
          sessionStorage.removeItem(ADMIN_SESSION_KEY);
        }
        if(currentUser){
          await auth.signOut();
        }
        currentUser = null;
        currentUserProfile = null;
        updateSidebarUI();
        showToast("تم تسجيل الخروج","success");
      }catch(e){
        console.error(e);
        showToast("فشل تسجيل الخروج","error");
      }finally{
        setLoading(false);
      }
    }

    function getHistoryStatusBadge(status){
      if(status === "approved" || status === "completed"){
        return `<span class="history-badge bg-green-50 text-green-700 border border-green-200"><i class="fas fa-circle-check"></i>${status === "completed" ? "مكتمل" : "تمت الموافقة"}</span>`;
      }
      if(status === "rejected"){
        return `<span class="history-badge bg-red-50 text-red-700 border border-red-200"><i class="fas fa-circle-xmark"></i>مرفوض</span>`;
      }
      return `<span class="history-badge bg-amber-50 text-amber-700 border border-amber-200"><i class="fas fa-clock"></i>قيد الانتظار</span>`;
    }

    async function loadUserOrders(){
      if(!currentUser){
        currentOrders = [];
        renderOrdersHistory();
        return;
      }
      try{
        const snap = await rtdb.ref(PATH_ORDERS).limitToLast(300).get();
        const obj = snap.val() || {};
        currentOrders = Object.entries(obj).map(([key,val]) => ({key,...val}))
          .filter(order =>
            String(order.customerUserId || "") === String(currentUser.uid || "") ||
            (currentUser.email && String(order.customerEmail || "").toLowerCase() === String(currentUser.email).toLowerCase())
          )
          .sort((a,b) => (b.createdAt || 0) - (a.createdAt || 0));
        renderOrdersHistory();
      }catch(e){
        console.error(e);
        currentOrders = [];
        renderOrdersHistory();
      }
    }

    function renderOrdersHistory(){
      const box = document.getElementById("ordersHistoryList");
      if(!currentUser){
        box.innerHTML = `
          <div class="text-center py-10">
            <i class="fas fa-user-lock text-5xl text-gray-200 mb-4"></i>
            <p class="text-gray-400 font-bold mb-4">يجب تسجيل الدخول أولاً</p>
            <button onclick="window.location.href='login.html'" class="px-5 py-3 bg-red-500 text-white font-bold">تسجيل الدخول</button>
          </div>
        `;
        return;
      }

      box.innerHTML = currentOrders.map(order => `
        <div class="bg-gray-50 border border-gray-100 rounded-[2rem] p-4">
          <div class="flex items-start gap-3">
            <img src="${escapeHtml(order.product?.image || 'https://via.placeholder.com/140?text=Order')}" class="w-16 h-16 object-cover rounded-[1rem] border bg-white">
            <div class="flex-grow">
              <div class="flex items-start justify-between gap-3">
                <div>
                  <div class="font-bold text-sm">${escapeHtml(order.product?.name || 'طلب')}</div>
                  <div class="text-[11px] text-gray-500 mt-2">
                    ${escapeHtml(order.displayAmount || '-')}
                  </div>
                </div>
                <div>${getHistoryStatusBadge(order.adminDecision || order.status || 'pending')}</div>
              </div>
              <div class="text-[11px] text-gray-400 font-bold mt-3">
                ${order.createdAt ? new Date(order.createdAt).toLocaleString('ar') : '-'}
              </div>
            </div>
          </div>
        </div>
      `).join('') || `<div class="text-center text-gray-400 py-8 font-bold">لا توجد طلبات بعد</div>`;
    }

    async function openOrdersHistory(){
      closeSidebar();
      openOrdersModal();
      setLoading(true);
      try{
        await loadUserOrders();
      }finally{
        setLoading(false);
      }
    }

    async function loadCurrentUserProfile(){
      currentUser = auth.currentUser;
      if(!currentUser) return null;

      const snap = await rtdb.ref(`${PATH_USERS}/${currentUser.uid}`).get();
      const data = snap.val() || null;
      currentUserProfile = data ? {uid: currentUser.uid, ...data} : {
        uid: currentUser.uid,
        email: currentUser.email || "",
        displayName: currentUser.displayName || "",
        username: "",
        userHandle: "",
        role: "user"
      };
      return currentUserProfile;
    }

    async function loadFromFirebase(){
      try{
        const [catsSnap, proSnap, countriesSnap, adsSnap, communitySnap] = await Promise.all([
          rtdb.ref(PATH_CATEGORIES).get(),
          rtdb.ref(PATH_PRODUCTS).get(),
          rtdb.ref(PATH_COUNTRIES).get(),
          rtdb.ref(PATH_ADS).get(),
          rtdb.ref(PATH_COMMUNITY_POSTS).get()
        ]);

        buildCategories(catsSnap.val() || {});
        buildCountries(countriesSnap.val() || {});
        buildProducts(proSnap.val() || {});
        buildAds(adsSnap.val() || {});
        buildCommunityPosts(communitySnap.val() || {});
        await loadStoreSettings();
        detectAndApplyCountry();
        sanitizeCart();
      }catch(e){
        console.error(e);
        categories = [];
        products = [];
        countries = [];
        ads = [];
        communityPosts = [];
        exchangeRate = 3.2;
        showToast("تعذر تحميل بعض البيانات","error");
      }

      renderCountryDropdown();
      renderCategoriesBar();
      renderProducts();
      updateCartUI();
      updateFooterDisplay();
      updateSidebarUI();
    }

    async function bootApp(){
      setLoading(true);
      try{
        await ensureAdminSettings();
        await auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
        await loadFromFirebase();

        auth.onAuthStateChanged(async (user) => {
          currentUser = user || null;
          if(currentUser){
            try{ await loadCurrentUserProfile(); }catch(e){ console.error(e); }
          }else{
            currentUserProfile = null;
          }
          updateSidebarUI();
          if(initialAuthResolved) await loadUserOrders();
          initialAuthResolved = true;
        });

        updateActionButtonState();
      }catch(e){
        console.error(e);
      }finally{
        setLoading(false);
      }
    }

    window.addEventListener("load", bootApp);
  </script>
</body>
</html>
